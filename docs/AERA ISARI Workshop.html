    <h2>Truly Equal Status Design: The Epistemological Engine of the Dashboard</h2>
    <div class="pink-line"></div>
    <p class="lead"><strong>Truly Equal Status Design (TESD)</strong> frames qualitative, quantitative, computational, visual, and multimodal evidence as interdependent sources of knowledge. Quantitative and computational outputs do not replace qualitative evidence; they function as maps that guide researchers back into the original materials.</p>
    <div class="tesd-pill-row"><span class="tesd-pill">Qualitative evidence grounds meaning</span><span class="tesd-pill">Quantitative outputs reveal structure</span><span class="tesd-pill">Visualizations guide inspection</span><span class="tesd-pill">ISARI supports synthesis</span><span class="tesd-pill">Researchers retain authority</span></div>
  </div>

  <div class="quote-block"><p>TESD means that qualitative and quantitative components remain genuinely integrated rather than hierarchically ordered. Computational outputs are not findings by themselves; they are structured waypoints for returning to evidence.</p><cite>Based on Chapter 1, “Democratizing Data Science for Textual, Relational, and Multimodal Scholarly Inquiry.”</cite></div>

  <div class="card pink">
    <h3>Why this tab belongs in the dashboard</h3>
    <p>Chapter 1 establishes the methodological foundation for the entire workshop ecosystem. The dashboard already contains ISARI, LACOID, MDCOR, SENA, integration, ethics, and technical guidance. This tab makes explicit the epistemology tying those tools together: data science is democratized when researchers can use no-code, open-source, local infrastructures while still preserving interpretive depth, transparency, privacy, and responsibility.</p>
    <p>TESD also explains why the tools should be used together. LACOID and MDCOR structure textual evidence, SENA analyzes affective evidence, NAQD models relational evidence, GRATIS reconstructs time, VERITAS replays interaction, GeoStoryTelling contextualizes place, and ISARI supports local comparison, memoing, synthesis, and writing.</p>
  </div>

  <div class="card gold">
    <h3>The 1 + 1 = 3 Integration Challenge</h3>
    <p>Chapter 1 draws on the mixed-methods integration challenge: qualitative and quantitative components should produce more together than either can produce alone. In TESD, integration is not additive in a simple sense; integration produces a more complete analytic object.</p>
    <div class="tesd-equation" aria-label="Qualitative evidence plus quantitative structure equals integrated interpretation">
      <div class="term"><h4>Qualitative evidence</h4><p>Original narratives, quotes, fieldnotes, context, participant voice, and meaning.</p></div>
      <div class="symbol">+</div>
      <div class="term"><h4>Quantitative / computational structure</h4><p>Classification, distributions, networks, temporal patterns, spatial traces, and visual outputs.</p></div>
      <div class="symbol">=</div>
      <div class="term"><h4>Integrated understanding</h4><p>A stronger interpretation that remains accountable to evidence while benefiting from structure.</p></div>
    </div>
  </div>

  <div class="grid-2">
    <div class="card"><h3>Four TESD commitments</h3><div class="outcome"><strong>1. Integration and epistemology</strong><p>Qualitative and quantitative elements are interdependent. Neither component carries the full interpretive burden alone.</p></div><div class="outcome"><strong>2. Structured, adaptive, flexible systems</strong><p>Methods are not fixed pipelines. Researchers move recursively among evidence, outputs, visualization, memoing, validation, and writing.</p></div><div class="outcome"><strong>3. Interpretive authority</strong><p>Researchers retain responsibility and privilege. AI and data science tools support interpretation; they do not own it.</p></div><div class="outcome"><strong>4. Democratization of data science</strong><p>No-code, local, open-source tools expand access while preserving rigor, transparency, and ethical stewardship.</p></div></div>
    <div class="card green"><h3>What TESD prevents</h3><ul class="checklist"><li>Treating topic models, sentiment scores, sociograms, or maps as final findings.</li><li>Subordinating qualitative evidence to numerical or visual outputs.</li><li>Using AI-generated prose without returning to transcripts, responses, fieldnotes, or figures.</li><li>Assuming democratization means reducing methodological rigor.</li><li>Confusing tool accessibility with interpretive automation.</li></ul><div class="tesd-note"><strong>Practical rule:</strong> every output should tell the researcher where to look next, what to compare, and which evidence should be revisited.</div></div>
  </div>

  <div class="card">
    <h3>How TESD translates into workshop practice</h3>
    <table><thead><tr><th>Framework / practice</th><th>Evidence type</th><th>Computational or visual output</th><th>Equal-status interpretive move</th></tr></thead><tbody>

      <tr><td><strong>SENA</strong></td><td>Emotionally meaningful language</td><td>Sentiment, NRC emotions, entropy, sociograms, QAP comparisons</td><td>Interpret emotional structure by returning to words, groups, and textual context.</td></tr>

  <div class="card green">
    <h3>TESD checklist before writing findings</h3>
    <ul class="checklist"><li>Have I identified the original qualitative evidence behind each computational output?</li><li>Have I separated what the chart, graph, map, or table shows from what I am interpreting?</li><li>Have I avoided treating model-generated labels as final themes or code names?</li><li>Have I checked representative texts or source excerpts or source materials before making claims?</li><li>Have I documented why this tool, model, metric, or visualization fits the research question?</li><li>Have I used ISARI to support thinking and writing, without treating it as the interpretive authority?</li></ul>
  </div>

  <div class="card dark">
    <h3>Bottom line</h3>
    <p>Truly Equal Status Design is the dashboard’s epistemological anchor. It explains why no-code data science, interactive visualizations, local AI, and qualitative interpretation belong together: each method expands what researchers can see, but meaning remains accountable to evidence and to the researcher’s disciplined judgment.</p>
  </div>

      <div class="agenda-row"><div class="time">0:30–1:10</div><div><h4>Block 2 · ISARI: Setup, Brains, and Prompting as Memoing</h4><p>Launching ISARI, selecting brains, understanding model differences, functional fine-tuning through prompt design, and practicing disciplined prompts. As the new addition to this AERA session, ISARI will be introduced as a local brainstorming partner for the stage that follows analysis: interpretation, memoing, synthesis, and writing. The emphasis will be on what ISARI can support, what it cannot replace, and how researchers can effectively and ethically integrate it into their workflow.</p></div><span class="badge b-isari">ISARI</span></div>

  <div class="hero"><span class="badge b-ethics">Ethics and IRB</span><h2>Ethical Foundations: Why Local AI Matters for Research</h2><div class="pink-line"></div><p class="lead">The decision to use local, offline AI is not merely technical. It is part of a methodologically coherent and ethically defensible research infrastructure that extends the same protective commitments researchers make during data collection through the full analytic cycle.</p><div class="quote-block"><p>“Locality turns ethics into infrastructure: evidence, interpretation, and responsibility remain together.”</p><cite>— ISARI chapter framing</cite></div></div>
  <div class="grid-3 ethics-grid">
    <div class="ethics-pillar"><div class="icon">🔒</div><h4>Data Privacy</h4><p>Interview transcripts, ethnographic notes, and survey responses often contain sensitive personal information. Local AI keeps this material within the researcher’s machine or institution.</p></div>
    <div class="ethics-pillar"><div class="icon">📋</div><h4>IRB Compliance</h4><p>IRB protocols increasingly scrutinize data processing, not just collection. External servers with unknown retention policies may violate confidentiality agreements.</p></div>
    <div class="ethics-pillar"><div class="icon">🤝</div><h4>Participant Trust</h4><p>Participants grant consent based on expectations about how data will be handled. Uploading narratives to commercial AI servers may break implicit or explicit trust contracts.</p></div>
    <div class="ethics-pillar"><div class="icon">👁️</div><h4>Re-identification Risk</h4><p>Even de-identified qualitative data can become recognizable through network graphs, temporal replays, spatial displays, or combinations of attributes.</p></div>
    <div class="ethics-pillar"><div class="icon">🔍</div><h4>Transparency</h4><p>Local execution with saved and exportable ISARI sessions creates an auditable interpretive trail that can be revisited and documented.</p></div>
    <div class="ethics-pillar"><div class="icon">⚖️</div><h4>Equity of Access</h4><p>Commercial AI services require subscriptions, internet access, and institutional agreements. Local, open-source tools democratize access to research data science.</p></div>
  </div>

  <div class="card"><h3>Discussion Questions for the Workshop</h3>
    <div class="acc-item open"><div class="acc-hdr">Q1: What does “no data leaves your machine” mean practically? <span>▼</span></div><div class="acc-body">It means the model, uploaded text, and generated response remain on the user’s computer. No prompt is sent to an external AI service, no API call is made, and no third-party system logs the data.</div></div>
    <div class="acc-item"><div class="acc-hdr">Q2: Can commercial AI tools be used for the same tasks? <span>▼</span></div><div class="acc-body">Sometimes, but only for public, non-sensitive, or fully de-identified materials, and only when allowed by IRB, institutional, funder, and journal policies. For interviews, focus groups, clinical notes, demographic-linked surveys, or vulnerable populations, local AI is usually the safer and more defensible option.</div></div>
    <div class="acc-item"><div class="acc-hdr">Q3: How should ISARI be described in IRB or methods language? <span>▼</span></div><div class="acc-body">ISARI can be described as a local, offline tool used to support memoing, comparison, synthesis, and writing after analytic outputs have been generated. The key points are that the data stay on the researcher’s computer, no materials are uploaded to an external AI service, and the research team checks all ISARI-supported writing against the original evidence.</div></div>
    <div class="acc-item"><div class="acc-hdr">Q4: How can researchers prevent over-interpretation? <span>▼</span></div><div class="acc-body">Researchers should give ISARI specific evidence to work from, ask for cautious language, and check every response against the original data. ISARI can help suggest patterns, but the researcher decides whether those patterns are actually supported.</div></div>
    <div class="acc-item"><div class="acc-hdr">Q5: How should researchers disclose ISARI use? <span>▼</span></div><div class="acc-body">Researchers can say that ISARI was used as a local, offline tool to support interpretation, memoing, synthesis, and drafting. The important point is that ISARI helped with thinking and writing, but did not make the final analytic decisions. The research team remains responsible for all claims, interpretations, and final text.</div></div>    <div class="acc-item"><div class="acc-hdr">Q6: What should participants avoid asking ISARI to do? <span>▼</span></div><div class="acc-body">Do not ask ISARI to create findings on its own, invent themes, summarize data it has not seen, or replace close reading. ISARI works best when researchers give it specific excerpts, tables, figures, or tool outputs and then check its response against the original evidence.</div></div>
  </div>

  <div class="card red"><h3>🚨 Red Lines: When Local AI Is Required, Not Optional</h3><ul class="redlines"><li>Interview or focus group transcripts where participants were promised confidentiality.</li><li>Survey responses linked to demographic identifiers, even indirectly.</li><li>Data from vulnerable populations, including minors, incarcerated individuals, undocumented immigrants, clinical patients, or protected groups.</li><li>Federally restricted data, FERPA-protected records, HIPAA-covered materials, or institutional data governed by data-use agreements.</li><li>Network data where structural features could re-identify participants.</li><li>Social media data where users had a reasonable expectation of limited audience.</li></ul></div>
  <div class="card dark"><h3>Suggested Methods / IRB Language</h3><p>ISARI was used as a local, fully offline brainstorming partner to support memo drafting, comparison, synthesis, and evidence-grounded writing from outputs generated by LACOID, MDCOR, SENA, and related analytic tools. ISARI outputs were treated as provisional analytic memos rather than findings. All AI-assisted interpretations were verified against original evidence before being incorporated into analysis. No participant data or analytic outputs were uploaded to external AI services during this process.</p></div>
</section>`,isari:`<section>
  <div class="hero"><span class="badge b-isari">ISARI</span><h2>Intelligent Systems for Academic Research Integration</h2><div class="pink-line"></div><p class="lead"><strong>ISARI is a local, fully offline, open-source brainstorming partner for ethical scholarly inquiry.</strong> ISARI is positioned downstream of LACOID, MDCOR, SENA, NAQD, GRATIS, VERITAS, and GeoStoryTelling. It supports interpretation, memoing, comparison, synthesis, visual description, and evidence-grounded scholarly writing after those tools have already structured the evidence.</p><p>ISARI does not replace the methodological frameworks in the book. It helps researchers work more coherently, reflexively, and efficiently with textual, structural, temporal, relational, spatial, affective, and visual outputs.</p></div>

  <div class="grid-2"><div class="card pink"><h3>What ISARI is</h3><p>ISARI is a local AI workspace that runs on the researcher’s own computer. It supports scholarly reasoning with representative quotations, classified datasets, network graphs, charts, temporal displays, replay frames, screenshots, maps, and multimodal evidence. Its role is to help researchers think with structured evidence more clearly.</p><p>Once ISARI is running locally, researchers can compare code solutions, describe latent codes, draft integrative memos, organize quotations, translate visual outputs into prose, and develop methods or findings language while keeping evidence local.</p></div><div class="card"><h3>What ISARI is not</h3><p>ISARI is not a classification framework, topic model, sentiment engine, network-analysis method, temporal replay system, or spatial visualization tool. It should not be asked to “analyze my data and tell me the findings.”</p><p>ISARI outputs are provisional brainstorming artifacts. Every suggestion must be verified against original transcripts, representative quotations, fieldnotes, classified datasets, visual outputs, maps, charts, replay frames, and researcher judgment.</p></div></div>

  <div class="figure-card"><h3>Figure 1. ISARI User Interface</h3><div class="isari-ui-recreation"><div class="isari-browser"><span class="macdot red"></span><span class="macdot yellow"></span><span class="macdot green"></span><span>ISARI — Intelligent Systems for Academic Research Integration</span></div><div class="isari-top-panel"><div class="isari-logo-box">Democratizing<br>Data Science</div><div class="isari-title-block"><span class="isari-pill">Local AI for privacy-preserving qualitative, quantitative, and mixed-methods integration</span><h4>ISARI</h4><p><strong>Intelligent Systems for Academic Research Integration</strong></p><p>Discover, compare, and explain patterns across narratives, sentiment and emotion analyses, topic modeling, and other text-based evidence — all locally, without uploading research data to any external server.</p></div><button class="isari-mode">Light mode</button></div><div class="isari-control-panel"><div><strong>Model</strong><div class="fake-input">Phi-4 Mini — Logic &amp; Concept Clarification</div><p>Optimized for concise reasoning, definitions, and clarity. Helpful for methods sections, conceptual framing, and analytic precision.</p></div><div><strong>Saved chats</strong><div class="fake-input">Select a chat</div></div></div><div class="isari-workspace"><h4>Research Workspace</h4><div class="query-bar">What is ISARI?</div><div class="brainstorming-badge">◌ Brainstorming...</div><div class="chat-entry">Ask a question, describe your integration challenge, or upload a narrative dataset... <button>Send</button></div></div></div><p class="caption"><strong>Alt caption.</strong> ISARI interface showing local workspace, model selection, saved chats, file attachment, and visible “Brainstorming…” state that frames ISARI as a thinking and writing partner rather than an answer engine.</p></div>

  <div class="card gold"><h3>ISARI within the methodological architecture of the book</h3><p>The methodological architecture of the book treats computational and visual outputs as analytic guides, not conclusions. LACOID and MDCOR retrieve latent textual structures. SENA retrieves affective structures. NAQD retrieves participant-code relational structures. GRATIS retrieves temporal development. VERITAS retrieves synchronous interaction dynamics. GeoStoryTelling retrieves place-based context.</p><p>ISARI becomes valuable after these outputs exist. Researchers still need to compare code solutions, write code descriptions, organize quotations, interpret group differences, explain visualizations, narrate temporal change, and build coherent arguments. ISARI supports this downstream interpretive labor without changing the methodological center of the book.</p></div>

  <div class="grid-2"><div class="card"><h3>Truly Equal Status Design</h3><p>ISARI is grounded in Truly Equal Status Design. Quantitative, visual, and computational outputs reveal structure, but qualitative evidence gives those structures meaning. ISARI strengthens the movement between output and evidence rather than subordinating qualitative judgment to AI.</p><p>A LACOID classification result guides researchers back to representative texts. A SENA emotion plot guides researchers back to the original words that produced the emotional pattern. A NAQD graph guides researchers back to coded excerpts. A GRATIS visualization guides researchers back to chronology. A GeoStoryTelling map guides researchers back to place-based narratives.</p></div><div class="card green"><h3>Why local execution matters</h3><p>Local execution extends privacy protection into the reasoning and writing stage. A workflow is incomplete if sensitive data are classified locally but then uploaded to a commercial AI service for interpretation. ISARI keeps evidence, interpretation, and responsibility together.</p><p>Local execution does not solve every ethical problem, but it materially reduces the risk of externalizing sensitive evidence into systems outside the researcher’s control.</p></div></div>

  <div class="card"><h3>Technical foundations: local language models, model size, and functional fine-tuning</h3><p>ISARI runs local language models on macOS and Windows. The ISARI chapter emphasizes that the lightest configuration can operate on modest hardware, including machines with approximately 8 GB of RAM and substantial local storage when using the smallest brain.</p><p>Model labels such as 4B, 7B, 8B, and 11B refer to billions of parameters. Smaller models are faster and less demanding; larger local models can support deeper comparison, longer reasoning, and synthesis. In ISARI, model size is only one consideration because each brain is functionally specialized.</p><p>Researchers do not need to retrain models. ISARI supports <strong>functional fine-tuning</strong>: selecting the appropriate brain, supplying the right evidence, and writing a disciplined prompt that defines analytic stage, evidence type, and epistemic boundaries.</p></div>

  <div class="card pink"><h3>Prompting as analytic memoing</h3><p>Prompts in ISARI are structured analytic memos, not generic commands. A strong prompt names the analytic framework, specifies supplied outputs, defines a bounded interpretive task, requests evidentiary grounding, and invites caution.</p><div class="grid-5 small-grid"><div class="outcome"><strong>1. Name the framework</strong><p>LACOID, MDCOR, SENA, NAQD, GRATIS, VERITAS, GeoStoryTelling, or multiple frameworks.</p></div><div class="outcome"><strong>2. Specify outputs</strong><p>Representative texts, classified datasets, plots, maps, network graphs, replay frames, or fieldnotes.</p></div><div class="outcome"><strong>3. Bound the task</strong><p>Describe, compare, memo, summarize, translate into prose, or identify uncertainty.</p></div><div class="outcome"><strong>4. Request grounding</strong><p>Ask for quotations, references to evidence, or direct observations from visible structures.</p></div><div class="outcome"><strong>5. Invite caution</strong><p>Ask ISARI to separate direct support from interpretation requiring researcher verification.</p></div></div></div>

  <div class="card"><h3>Why the interface says “Brainstorming…”</h3><p>The visible “Brainstorming…” label is methodological. ISARI is not producing findings. ISARI is generating possible interpretive paths, contrasts, summaries, language, and questions for the researcher to inspect. The label helps prevent epistemic slippage: treating fluent AI prose as evidence or as a finding.</p><p>This framing matters for visual outputs. A vision-capable brain may describe a chart, graph, map, scanned page, screenshot, or replay frame, but visual description is not substantive interpretation. Researchers must connect visible patterns to original evidence, research questions, and context.</p></div>

  <div class="card"><h3>The Current ISARI Brains and Their Analytic Roles</h3><table><thead><tr><th>Brain</th><th>Model size</th><th>Demand</th><th>Primary analytic role</th><th>Best-fit scholarly uses</th><th>Language support / notes</th></tr></thead><tbody><tr><td><strong>Gemma 3</strong></td><td>4B</td><td>Low</td><td>Lightweight multimodal baseline</td><td>Summaries, memo drafting, prose translation, quick visual grounding.</td><td>Broad multilingual reach; useful for English, Spanish, and multilingual everyday prompting.</td></tr><tr><td><strong>Qwen 2.5 Coder</strong></td><td>7B</td><td>Moderate</td><td>Structured reasoning and method organization</td><td>Tables, scripts, prompt templates, reproducible workflows, methodological appendices.</td><td>Broad multilingual text support plus extensive programming-language support.</td></tr><tr><td><strong>Phi-4 Mini</strong></td><td>~4B</td><td>Low</td><td>Conceptual clarification and concise reasoning</td><td>Methods text, bridge paragraphs, definitional work, short analytic explanations.</td><td>Supports multiple languages including English, Spanish, Portuguese, French, German, Arabic, Chinese, Japanese, Korean, Russian, and Thai.</td></tr><tr><td><strong>DeepSeek R1</strong></td><td>8B</td><td>Moderate–High</td><td>Deep reasoning and synthesis</td><td>Comparative interpretation, theory building, integrative discussion, cross-framework synthesis.</td><td>Reasoning-first interpretive prose.</td></tr><tr><td><strong>Vision brain: document-oriented</strong></td><td>~7B</td><td>Moderate</td><td>Document, chart, and layout interpretation</td><td>Scanned pages, charts, tables, diagrams, bilingual figures, screenshots.</td><td>Useful when labels, page structures, or figure annotations are not English-only.</td></tr><tr><td><strong>Vision brain: high-detail</strong></td><td>~11B</td><td>High</td><td>Higher-detail visual reasoning</td><td>Complex screenshots, dense figures, visually rich outputs.</td><td>Best treated as English-first for image-plus-text work.</td></tr></tbody></table></div>

  <div class="card green"><h3>Integrating ISARI with the Frameworks in the Book</h3><div class="grid-2"><div class="outcome"><strong>ISARI + LACOID</strong><p>Compare alternative code solutions, describe latent codes, organize quotations, and use LACOID plots or diagnostic figures as evidence for grounded memos.</p></div><div class="outcome"><strong>ISARI + MDCOR</strong><p>Summarize short-response classes, draft group comparison memos, explain diagnostic plots, and translate classification outputs into reports.</p></div><div class="outcome"><strong>ISARI + SENA</strong><p>Describe emotional structure, interpret entropy, translate QAP outputs into prose, and connect emotional findings back to representative texts.</p></div><div class="outcome"><strong>ISARI + NAQD</strong><p>Explain participant-code networks, centrality, communities, and group-specific network contrasts while returning to coded excerpts.</p></div><div class="outcome"><strong>ISARI + GRATIS</strong><p>Narrate temporal phases, compare aggregated and dynamic outputs, and explain developments over time.</p></div><div class="outcome"><strong>ISARI + VERITAS</strong><p>Describe synchronous replay frames, turning points, actor centrality, moderator influence, and interactional shifts.</p></div><div class="outcome"><strong>ISARI + GeoStoryTelling</strong><p>Translate maps, routes, place markers, and multimedia storyboards into place-sensitive prose.</p></div><div class="outcome"><strong>Cross-framework integration</strong><p>Combine classification, emotion, structure, time, interaction, and place into coherent analytic memos and discussion sections.</p></div></div></div>

  <div class="card pink"><h3>Purposeful Brainstorming with ISARI: Example Prompts</h3>

    <div class="prompt-card" data-kind="lacoid">
      <div class="prompt-title"><span class="badge b-lacoid">LACOID</span><h4>First-pass code description</h4></div>
      <button class="copy" data-copy="isariP1">Copy</button>
      <pre id="isariP1">I relied on LACOID to classify a long-form textual database into [N] latent codes. I am uploading the top 20 most representative original texts for each code, together with my fieldnotes and coding notes. Can you provide an initial description of the main patterns you see within each code? Please keep your interpretation close to the texts, include representative quotations, and indicate where I should return to the full classified dataset before naming each code definitively.</pre>
    </div>


    <div class="prompt-card" data-kind="mdcor">
      <div class="prompt-title"><span class="badge b-mdcor">MDCOR</span><h4>Thematic summary of classified short texts</h4></div>
      <button class="copy" data-copy="isariP2">Copy</button>
      <pre id="isariP2">I relied on MDCOR to classify a database of short open-ended survey responses into [N] classes. I am uploading the top 20 most representative responses for each class and a short memo describing the context of data collection. Can you provide an initial thematic description of each class, identify overlaps or contrasts across classes, and quote responses that best illustrate your reading? Please indicate where short response length makes interpretation less certain.</pre>
    </div>


    <div class="prompt-card" data-kind="sena">
      <div class="prompt-title"><span class="badge b-sena">SENA</span><h4>Describing emotional structure</h4></div>
      <button class="copy" data-copy="isariP3">Copy</button>
      <pre id="isariP3">I used SENA to analyze sentiment and emotion distributions and I am uploading screenshots of plots, summary tables, and representative original texts. Can you describe the main emotional patterns, including which emotions appear more central, whether there seems to be coherence or contradiction, and how those patterns relate to representative texts? Please distinguish what is visible in the plots from what requires return to the original corpus.</pre>
    </div>


    <div class="prompt-card" data-kind="integration">
      <div class="prompt-title"><span class="badge b-isari">Integration</span><h4>Classification + emotion memo</h4></div>
      <button class="copy" data-copy="isariP4">Copy</button>
      <pre id="isariP4">I used MDCOR or LACOID to classify texts and SENA to analyze the emotional distribution of those classes. I am uploading representative texts, emotion screenshots, QAP outputs, and analytic notes. Can you draft a memo describing how thematic and emotional structures reinforce or complicate each other? Please remain close to the supplied evidence and identify where emotional outputs add something classification alone did not reveal.</pre>
    </div>

  </div>

  <div class="card dark"><h3>Closing synthesis</h3><p>ISARI’s strongest contribution is practical and methodological at once: it helps researchers think more carefully, write more clearly, and remain within a privacy-conscious, ethically defensible, and methodologically coherent environment. ISARI points toward more deliberate, portable, and integrative forms of scholarly reasoning: from evidence to memo, from memo to prose, and back again to the evidence.</p></div>

    <h2>LACOID: Latent Code Identification for Long Textual Evidence</h2>
    <div class="pink-line"></div>
    <p class="lead"><strong>LACOID</strong> integrates machine-assisted classification and human interpretive judgment to classify qualitative texts while preserving original participant voices, textual locations, and contextual meanings. The central contribution of Chapter 5 is that LACOID makes large-scale, transparent, context-preserving qualitative text classification possible without requiring programming expertise.</p>
    <p>LACOID is designed for the tension at the heart of qualitative data science: human coding is nuanced but slow and inconsistent, while machine learning is efficient and consistent but can lose context. LACOID addresses this tension by decomposing long texts, applying machine learning, and returning researchers to the original unaltered texts for interpretation.</p>
  </div>

  <div class="quote-block"><p>Machine classification intensifies the need for qualitative interpretation; it does not replace it. LACOID’s outputs are maps back to participant language, context, and meaning.</p><cite>Based on Chapter 5, “Latent Code Identification (LACOID).”</cite></div>

  <div class="grid-2">
    <div class="card pink"><h3>The Problem LACOID Solves</h3><p>Qualitative researchers must label, code, and classify evidence after compiling interviews, focus group transcripts, essays, policy documents, social media posts, or open-ended responses. Manual human classification provides depth and contextual sensitivity, but it is labor-intensive and vulnerable to inconsistency. Machine learning provides speed and consistency, but can abstract away from participant meaning.</p><p>LACOID’s answer is a human-in-the-loop workflow that mirrors line-by-line coding while using machine learning to scale classification and preserve auditability.</p></div>
    <div class="card"><h3>MACOID + HUCOID</h3><p>Chapter 5 frames LACOID as an integrative framework joining <strong>machine code identification</strong> with <strong>human code identification</strong>. Machine learning identifies latent structure, but humans interpret, name, validate, and contextualize the codes.</p><div class="lacoid-callout"><strong>Dashboard principle:</strong> LACOID is not an automatic meaning machine. LACOID structures evidence so researchers can interpret more transparently and efficiently.</div></div>
  </div>

  <div class="card gold"><h3>Why Decomposition Matters: Minimizing LCAB</h3><p><strong>Latent Code Aggregation Bias (LCAB)</strong> occurs when a long document is classified as if it expresses only one dominant theme. A single interview, essay, or transcript may contain multiple meanings, contradictions, temporal shifts, and distinct interpretive units. LACOID minimizes LCAB by decomposing long documents into smaller units before classification.</p><div class="grid-2"><div class="outcome"><strong>Sentence-level decomposition</strong><p>Each sentence becomes a classification unit. This mirrors line-by-line coding, increases sample size, supports MCMC/Gibbs sampling, and is the default strategy. Chapter 5 notes a default minimum sentence length of 10 words, adjustable from 5 to 30.</p></div><div class="outcome"><strong>Paragraph-level decomposition</strong><p>Researchers manually delimit meaningful chunks by blank lines. This is less computationally expensive but may retain some aggregation bias if a paragraph contains multiple latent meanings.</p></div></div></div>

  <div class="card"><h3>LACOID Workflow: Eight Connected Stages</h3><div class="grid-2"><div><div class="lacoid-stage"><strong>1. Prepare and upload evidence</strong><p>Upload interviews, focus group transcripts, essays, policy briefs, social media posts, or other textual sources. Chapter 5’s running example uses the School Leavers Study essays.</p></div><div class="lacoid-stage"><strong>2. Select decomposition</strong><p>Choose sentence-level or paragraph-level decomposition. Remove interviewer questions or irrelevant comments before analysis when appropriate.</p></div><div class="lacoid-stage"><strong>3. Text mine and normalize</strong><p>Clean and normalize text while preserving original text for later interpretation. LACOID records excluded short or sparse texts for transparency.</p></div><div class="lacoid-stage"><strong>4. Inspect frequent words</strong><p>Review common words and optionally remove words that do not support classification.</p></div></div><div><div class="lacoid-stage"><strong>5. Assess metrics</strong><p>Use multiple metrics — including Griffiths, Cao, Arun, and Deveaud — to identify plausible numbers of latent codes.</p></div><div class="lacoid-stage"><strong>6. Select and compare code solutions</strong><p>Compare solutions such as 3-code and 7-code outputs. Chapter 5 emphasizes that metrics guide but qualitative review decides.</p></div><div class="lacoid-stage"><strong>7. Execute classification</strong><p>Run LDA-based classification using MCMC/Gibbs sampling and assign decomposed text units to latent codes.</p></div><div class="lacoid-stage"><strong>8. Interpret and export outputs</strong><p>Download classified datasets, top representative texts, group tests, sociograms, file-to-code distributions, and excluded-text databases for auditability and ISARI memoing.</p></div></div></div></div>

        <rect x="880" y="270" width="210" height="80" rx="14" fill="#EAF7F2" stroke="#0F6E56" stroke-width="2"/><text x="985" y="305" text-anchor="middle" font-size="17" font-weight="700" fill="#011F5B">8. Interpret</text><text x="985" y="328" text-anchor="middle" font-size="13" fill="#52627C">return to original evidence</text>
        <line x1="265" y1="100" x2="330" y2="100" stroke="#011F5B" stroke-width="2.5" marker-end="url(#pipeArrow)"/><line x1="540" y1="100" x2="605" y2="100" stroke="#011F5B" stroke-width="2.5" marker-end="url(#pipeArrow)"/><line x1="815" y1="100" x2="880" y2="100" stroke="#011F5B" stroke-width="2.5" marker-end="url(#pipeArrow)"/><path d="M985,140 C985,210 160,205 160,270" fill="none" stroke="#011F5B" stroke-width="2.5" marker-end="url(#pipeArrow)"/><line x1="265" y1="310" x2="330" y2="310" stroke="#011F5B" stroke-width="2.5" marker-end="url(#pipeArrow)"/><line x1="540" y1="310" x2="605" y2="310" stroke="#011F5B" stroke-width="2.5" marker-end="url(#pipeArrow)"/><line x1="815" y1="310" x2="880" y2="310" stroke="#011F5B" stroke-width="2.5" marker-end="url(#pipeArrow)"/>
        <rect x="160" y="455" width="800" height="84" rx="18" fill="#F6F8FC" stroke="#D6DEED"/><text x="560" y="490" text-anchor="middle" font-size="18" fill="#011F5B" font-weight="700">The pipeline is recursive, not mechanical.</text><text x="560" y="518" text-anchor="middle" font-size="15" fill="#52627C">Metrics narrow choices; representative texts, context, and researcher judgment determine meaning.</text>
      </g>
    </svg>
  </div>

  <div class="card"><h3>Outputs and Interpretive Uses</h3><table><thead><tr><th>LACOID output</th><th>What it contains</th><th>How researchers should use it</th></tr></thead><tbody><tr><td><strong>Interactive word-code distributions</strong></td><td>Code bubbles, salient words, word frequencies, distances, overlap, and code separability.</td><td>Use as an entry point for identifying candidate meanings; do not name codes from words alone.</td></tr><tr><td><strong>Fully classified dataset</strong></td><td>Document ID, sentence/paragraph position, cleaned text, original unaltered text, code assignment, relative text contribution, and group fit.</td><td>Return from code to original evidence and inspect text locations before writing claims.</td></tr><tr><td><strong>Top representative texts</strong></td><td>Up to 20 most representative original texts per latent code.</td><td>Use for code naming, memoing, quotation selection, and ISARI-supported synthesis.</td></tr><tr><td><strong>Excluded texts database</strong></td><td>Texts excluded for short length, sparsity, or low analytic value.</td><td>Use for auditability and to assess whether exclusions introduce bias.</td></tr><tr><td><strong>Group-code tests</strong></td><td>Chi-squared test with Monte Carlo simulation and heat map / PDF outputs.</td><td>Use to examine associations between file-name encoded groups and latent codes.</td></tr><tr><td><strong>Network sociograms</strong></td><td>Actor/group/code relationships and strongest links.</td><td>Use to visualize group-code structure and identify where qualitative explanation is needed.</td></tr><tr><td><strong>File-to-code strength database</strong></td><td>Each file’s distribution across latent codes, including total number of LACOID units and weights.</td><td>Merge with quantitative attributes for follow-up modeling and hypothesis generation.</td></tr></tbody></table></div>

  <div class="card green"><h3>Chapter 5 Applied Example: School Leavers Study</h3><p>Chapter 5 illustrates LACOID with essays from the School Leavers Study: 154 essays written by UK schoolchildren in 1978. The example shows how filenames can encode groups, how documents can be decomposed into sentences, and how LACOID can compare group-code associations after classification.</p><div class="grid-3"><div class="metric"><span>Example corpus</span><strong>154</strong><em>essays</em></div><div class="metric"><span>Analyzed sentences</span><strong>3,222</strong><em>≥10 words</em></div><div class="metric"><span>Short exclusions</span><strong>768</strong><em>sentences below threshold</em></div></div><p>In the example, a 3-code solution was selected because it produced more differentiable latent codes than the 7-code solution. The interpreted codes included school-to-work/career transitions, nostalgic reflection/retirement, and family formation/home/adulthood challenges.</p></div>

  <div class="figure-card"><h3>Figure 5.3. File Naming Enables Group-to-Code Hypothesis Testing</h3><svg class="lacoid-flow" viewBox="0 0 1100 520" role="img" aria-label="File naming enables group-to-code testing in LACOID"><defs><marker id="gArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#011F5B"/></marker></defs><rect width="1100" height="520" fill="#fff"/><g font-family="Inter, Arial, sans-serif"><rect x="70" y="70" width="260" height="105" rx="16" fill="#F8FBFF" stroke="#011F5B" stroke-width="2"/><text x="200" y="112" text-anchor="middle" font-size="19" fill="#011F5B" font-weight="700">Original filenames</text><text x="200" y="142" text-anchor="middle" font-size="14" fill="#52627C">boy_sixteen_1.doc</text><text x="200" y="162" text-anchor="middle" font-size="14" fill="#52627C">girl_seventeen+_154.doc</text><rect x="420" y="70" width="260" height="105" rx="16" fill="#FFF0F8" stroke="#E4007C" stroke-width="2"/><text x="550" y="112" text-anchor="middle" font-size="19" fill="#011F5B" font-weight="700">Group labels</text><text x="550" y="142" text-anchor="middle" font-size="14" fill="#52627C">boy_sixteen_</text><text x="550" y="162" text-anchor="middle" font-size="14" fill="#52627C">girl_seventeen+_</text><rect x="770" y="70" width="260" height="105" rx="16" fill="#FFF8D6" stroke="#F2C100" stroke-width="2"/><text x="900" y="112" text-anchor="middle" font-size="19" fill="#011F5B" font-weight="700">Group-code tests</text><text x="900" y="142" text-anchor="middle" font-size="14" fill="#52627C">Chi-squared + Monte Carlo</text><text x="900" y="162" text-anchor="middle" font-size="14" fill="#52627C">heat map and sociogram</text><line x1="330" y1="122" x2="420" y2="122" stroke="#011F5B" stroke-width="2.5" marker-end="url(#gArrow)"/><line x1="680" y1="122" x2="770" y2="122" stroke="#011F5B" stroke-width="2.5" marker-end="url(#gArrow)"/><rect x="155" y="280" width="790" height="110" rx="18" fill="#EAF7F2" stroke="#0F6E56" stroke-width="2"/><text x="550" y="320" text-anchor="middle" font-size="20" fill="#011F5B" font-weight="700">Interpretive caution</text><text x="550" y="350" text-anchor="middle" font-size="15" fill="#52627C">Group associations show patterned differences in code distributions.</text><text x="550" y="374" text-anchor="middle" font-size="15" fill="#52627C">Researchers must return to the original texts before explaining why patterns appear.</text></g></svg></div>

  <div class="grid-2"><div class="card pink"><h3>Relative Text Contribution and Group Fit</h3><p>LACOID provides probability-informed measures to help researchers evaluate how representative a text is within a code and how well a text fits its assigned group. Chapter 5 describes <strong>relative text contribution</strong> and <strong>relative group fit</strong> as measures with maximum values of 1.</p><p>These measures help researchers identify strong exemplars, ambiguous cases, duplicated sentences, and texts that require closer qualitative reading.</p></div><div class="card"><h3>Duplicate and Data-Quality Detection</h3><p>Because LACOID decomposes and classifies individual text units, identical or highly similar text segments can surface during output review. Chapter 5 notes that duplicate sentences can reveal plagiarism, copied text, or data-preparation issues, making LACOID useful for quality assessment as well as classification.</p></div></div>

  <div class="card gold"><h3>How LACOID Connects to ISARI</h3><p>LACOID structures long textual evidence; ISARI helps researchers interpret that structure. The strongest workflow is to export LACOID outputs — top representative texts, classified datasets, word-code plots, group tests, sociograms, and file-to-code distributions — and use ISARI to draft cautious analytic memos that remain grounded in the original text.</p><div class="lacoid-mini-grid"><div class="outcome"><strong>Compare solutions</strong><p>Ask ISARI to compare 3-code vs. 7-code solutions and identify what is gained or lost.</p></div><div class="outcome"><strong>Draft code descriptions</strong><p>Use representative original texts to write code definitions and memo language.</p></div><div class="outcome"><strong>Interpret group tests</strong><p>Translate heat maps, sociograms, and file-to-code distributions into prose, then verify against texts.</p></div></div></div>

  <div class="card"><h3>Suggested ISARI Prompts for LACOID Outputs</h3>

    <div class="prompt-card">
      <div class="prompt-title"><span class="badge b-lacoid">LACOID Prompt</span><h4>Compare 3-code and 7-code LACOID solutions</h4></div>
      <button class="copy" data-copy="lacoidDeepPrompt1">Copy</button>
      <pre id="lacoidDeepPrompt1">I ran LACOID on a long-form qualitative corpus and obtained two plausible solutions: 3 codes and 7 codes. I am uploading representative texts, LDAvis screenshots, and summary notes for both. Please compare what is gained and lost in each solution, identify which codes appear to split or merge, and flag where the visual overlap requires return to original text before naming codes.</pre>
    </div>

    <div class="prompt-card">
      <div class="prompt-title"><span class="badge b-lacoid">LACOID Prompt</span><h4>Draft code descriptions from representative texts</h4></div>
      <button class="copy" data-copy="lacoidDeepPrompt2">Copy</button>
      <pre id="lacoidDeepPrompt2">I used LACOID to classify decomposed long texts into [N] latent codes. I am uploading the top 20 most representative original texts per code, with text contribution and group fit. Please draft tentative code descriptions, quote representative excerpts, identify ambiguous texts, and explain what additional context I should inspect before final code naming.</pre>
    </div>

    <div class="prompt-card">
      <div class="prompt-title"><span class="badge b-lacoid">LACOID Prompt</span><h4>Interpret group-code relationships</h4></div>
      <button class="copy" data-copy="lacoidDeepPrompt3">Copy</button>
      <pre id="lacoidDeepPrompt3">I used LACOID filenames to encode participant groups and generated group-code tests, a heat map, and a sociogram. I am uploading the PDF/HTML outputs and representative texts. Please describe the visible group-code patterns, distinguish statistical association from substantive interpretation, and identify which original texts should be read before writing findings.</pre>
    </div>
  </div>

  <div class="card dark"><h3>Bottom line</h3><p>LACOID democratizes qualitative data science by making advanced text mining, LDA-based classification, MCMC/Gibbs sampling, interactive visualization, hypothesis testing, and exportable data products available through a no-code, context-preserving workflow. Its methodological value depends on the same principle that grounds the dashboard: computational structure should guide researchers back to original qualitative evidence, not away from it.</p></div>

  <div class="hero">
    <span class="badge b-mdcor">MDCOR</span>
    <h2>MDCOR: Machine Driven Classification of Open-Ended Responses</h2>
    <div class="pink-line"></div>
    <p class="lead"><strong>MDCOR</strong> is a no-code, cost-free, machine-learning framework and software application for classifying short open-ended responses while preserving original participant voices. Chapter 6 positions MDCOR as a practical answer to a recurring mixed-methods challenge: open-ended survey questions generate rich qualitative evidence, but manual classification can be slow, inconsistent, and difficult to scale.</p>
    <p>MDCOR uses natural language processing, text mining, unsupervised classification, Bayesian statistics, MCMC, and Gibbs sampling to identify latent response classes. The software classifies responses efficiently, but interpretation, code naming, ethical judgment, and substantive explanation remain the researcher’s responsibility.</p>
  </div>

  <div class="quote-block"><p>Classification is not interpretation. MDCOR retrieves latent structure in short texts; researchers rebuild meaning by returning to original responses, representative texts, group patterns, and methodological context.</p><cite>Based on Chapter 6, “Machine Driven Classification of Open-ended Responses (MDCOR).”</cite></div>

  <div class="grid-2">
    <div class="card pink"><h3>Why MDCOR Matters</h3><p>Open-ended questions let respondents answer in their own words and can reveal concerns that fixed-choice survey items miss. Yet open-ended responses are often underused because manual coding is labor-intensive, can require intercoder agreement, and may produce inconsistent labels across coders.</p><p>MDCOR addresses this gap by supporting rapid, transparent, reproducible classification of short texts at scale while keeping original responses available for qualitative review.</p></div>
    <div class="card"><h3>Representational, Not Instrumental</h3><p>Chapter 6 distinguishes deductive or instrumental classification from representational classification. MDCOR follows a representational approach: codes emerge from the texts rather than being imposed in advance.</p><div class="mdcor-callout"><strong>Practical rule:</strong> use MDCOR to retrieve response structure, then use qualitative judgment to name codes, interpret group differences, and decide which quotations support findings.</div></div>
  </div>

  <div class="figure-card">
    <h3>Figure 6.1. Human Coding and Machine-Driven Classification</h3>
    <svg class="mdcor-flow" viewBox="0 0 1100 520" role="img" aria-label="Manual coding compared with machine-driven classification in MDCOR">
      <defs><marker id="mArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#011F5B"/></marker><marker id="pinkMArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#E4007C"/></marker></defs>
      <rect width="1100" height="520" fill="#fff"/>
      <rect x="70" y="75" width="265" height="140" rx="18" fill="#F8FBFF" stroke="#011F5B" stroke-width="3"/><text x="202" y="118" text-anchor="middle" font-size="24" fill="#011F5B" font-weight="700">Manual coding</text><text x="202" y="150" text-anchor="middle" font-size="15" fill="#122036">nuance · contextual awareness</text><text x="202" y="174" text-anchor="middle" font-size="14" fill="#52627C">but slow, labor-intensive, and uneven</text>
      <rect x="70" y="305" width="265" height="140" rx="18" fill="#FFF0F8" stroke="#E4007C" stroke-width="3"/><text x="202" y="348" text-anchor="middle" font-size="24" fill="#011F5B" font-weight="700">Machine classification</text><text x="202" y="380" text-anchor="middle" font-size="15" fill="#122036">speed · consistency · scale</text><text x="202" y="404" text-anchor="middle" font-size="14" fill="#52627C">but requires meaning reconstruction</text>
      <rect x="455" y="190" width="280" height="140" rx="20" fill="#fff" stroke="#011F5B" stroke-width="3"/><text x="595" y="238" text-anchor="middle" font-size="32" fill="#011F5B" font-weight="700">MDCOR</text><text x="595" y="270" text-anchor="middle" font-size="16" fill="#122036">machine-driven classification</text><text x="595" y="296" text-anchor="middle" font-size="15" fill="#52627C">for short open-ended responses</text>
      <rect x="820" y="120" width="230" height="100" rx="18" fill="#FFF8D6" stroke="#F2C100" stroke-width="3"/><text x="935" y="158" text-anchor="middle" font-size="21" fill="#011F5B" font-weight="700">Latent classes</text><text x="935" y="187" text-anchor="middle" font-size="14" fill="#52627C">emergent response themes</text>
      <rect x="820" y="305" width="230" height="100" rx="18" fill="#EAF7F2" stroke="#0F6E56" stroke-width="3"/><text x="935" y="343" text-anchor="middle" font-size="21" fill="#011F5B" font-weight="700">Qualitative return</text><text x="935" y="372" text-anchor="middle" font-size="14" fill="#52627C">original responses and quotes</text>
      <line x1="335" y1="145" x2="455" y2="235" stroke="#011F5B" stroke-width="3" marker-end="url(#mArrow)"/><line x1="335" y1="375" x2="455" y2="285" stroke="#E4007C" stroke-width="3" marker-end="url(#pinkMArrow)"/><line x1="735" y1="245" x2="820" y2="170" stroke="#011F5B" stroke-width="3" marker-end="url(#mArrow)"/><line x1="735" y1="285" x2="820" y2="355" stroke="#011F5B" stroke-width="3" marker-end="url(#mArrow)"/>
    </svg>
    <p class="caption">This concept figure summarizes Chapter 6’s contrast between human-driven coding and machine-driven classification.</p>
  </div>

  <div class="card gold"><h3>MDCOR Analytic Workflow</h3><div class="grid-2"><div><div class="mdcor-stage"><strong>1. Upload CSV</strong><p>Upload a universal CSV file with at least an ID column and one text column. A group or categorical column is optional for post-hoc association testing.</p></div><div class="mdcor-stage"><strong>2. Execute text mining</strong><p>Use NLP and text mining to normalize responses. MDCOR preserves original responses and provides downloadable dropped-response outputs.</p></div><div class="mdcor-stage"><strong>3. Inspect frequent words</strong><p>Review top frequent words and optionally remove overly common terms by position. Deleted words can be reinstated by rerunning text mining.</p></div><div class="mdcor-stage"><strong>4. Set parameters</strong><p>Chapter 6 recommends default values such as 500 burn-in samples, 5,000 posterior resamples, β = 0.1, and α = 50 unless robustness checks require changes.</p></div></div><div><div class="mdcor-stage"><strong>5. Execute metrics</strong><p>Use multiple metrics to justify the optimal number of response classes. Agreement across metrics increases confidence but does not replace qualitative review.</p></div><div class="mdcor-stage"><strong>6. Choose code number</strong><p>Select the candidate code solution indicated by metrics and substantive review. The Austin example selected a four-code solution.</p></div><div class="mdcor-stage"><strong>7. Execute MDCOR</strong><p>Classify responses and generate interactive summaries, representative-response tables, fully classified datasets, and code-to-group outputs.</p></div><div class="mdcor-stage"><strong>8. Interpret, export, and integrate</strong><p>Use representative responses, group tests, network outputs, and classified datasets in ISARI for cautious memoing and evidence-grounded writing.</p></div></div></div></div>

topic map + words</text><rect x="445" y="290" width="230" height="85" rx="14" fill="#EAF7F2" stroke="#0F6E56" stroke-width="2"/><text x="560" y="324" text-anchor="middle" font-size="17" font-weight="700" fill="#011F5B">Representative texts</text><text x="560" y="349" text-anchor="middle" font-size="13" fill="#52627C">top responses per code</text><rect x="745" y="290" width="230" height="85" rx="14" fill="#FFF0F8" stroke="#E4007C" stroke-width="2"/><text x="860" y="324" text-anchor="middle" font-size="17" font-weight="700" fill="#011F5B">Group comparisons</text><text x="860" y="349" text-anchor="middle" font-size="13" fill="#52627C">mosaic + network outputs</text><line x1="265" y1="105" x2="330" y2="105" stroke="#011F5B" stroke-width="2.5" marker-end="url(#pipeM)"/><line x1="540" y1="105" x2="605" y2="105" stroke="#011F5B" stroke-width="2.5" marker-end="url(#pipeM)"/><line x1="815" y1="105" x2="880" y2="105" stroke="#011F5B" stroke-width="2.5" marker-end="url(#pipeM)"/><path d="M985,145 C985,230 260,220 260,290" fill="none" stroke="#011F5B" stroke-width="2.5" marker-end="url(#pipeM)"/><line x1="375" y1="333" x2="445" y2="333" stroke="#011F5B" stroke-width="2.5" marker-end="url(#pipeM)"/><line x1="675" y1="333" x2="745" y2="333" stroke="#011F5B" stroke-width="2.5" marker-end="url(#pipeM)"/><rect x="200" y="470" width="720" height="70" rx="16" fill="#F6F8FC" stroke="#D6DEED"/><text x="560" y="502" text-anchor="middle" font-size="18" fill="#011F5B" font-weight="700">MDCOR output becomes qualitative evidence for interpretation.</text><text x="560" y="528" text-anchor="middle" font-size="14" fill="#52627C">Researchers return to original responses before naming codes or writing claims.</text></g></svg></div>

  <div class="card"><h3>MDCOR Outputs and How to Use Them</h3><table><thead><tr><th>Output</th><th>What it contains</th><th>Interpretive use</th></tr></thead><tbody><tr><td><strong>Metrics plot</strong></td><td>Multiple indicators for selecting the number of latent response classes.</td><td>Justify the candidate code solution; compare metrics before final selection.</td></tr><tr><td><strong>Interactive code summary</strong></td><td>Intertopic map, code distances, word frequencies, exclusive and shared words.</td><td>Identify possible meanings, overlaps, and areas requiring response-level review.</td></tr><tr><td><strong>Fully classified dataset</strong></td><td>ID, original response, assigned code, probabilities, text contribution, and group fit.</td><td>Audit classification and merge with quantitative variables for mixed-methods analysis.</td></tr><tr><td><strong>Top representative responses</strong></td><td>Top 5–20 responses per code, including contribution and fit metrics.</td><td>Rebuild code meanings from participant language and select quotations cautiously.</td></tr><tr><td><strong>Dropped response dataset</strong></td><td>Responses excluded during text mining because they are empty, sparse, or outlying.</td><td>Review exclusions for bias, data quality, and transparency.</td></tr><tr><td><strong>Group association tests</strong></td><td>Chi-squared / MCMC p-values, mosaic plots, and group-code outputs.</td><td>Assess whether groups are over- or under-represented in response classes.</td></tr><tr><td><strong>Code network visualization</strong></td><td>Relationships among codes and shared response structures.</td><td>Inspect code proximity and overlap; identify where deeper qualitative explanation is needed.</td></tr></tbody></table></div>

  <div class="card green"><h3>Chapter 6 Applied Example: Austin Community Survey</h3><p>Chapter 6 illustrates MDCOR with Austin Community Survey data from 2015–2019. The dataset contains 10,684 rows and 251 columns, with analysis focused on open-ended mayor comments and a home-ownership indicator. After text processing, the example analyzes 2,914 open-ended responses, reports a vocabulary of 826 terms, and selects a four-code solution.</p><div class="grid-4"><div class="metric"><span>Dataset rows</span><strong>10,684</strong><em>Austin survey rows</em></div><div class="metric"><span>Analyzed responses</span><strong>2,914</strong><em>open-ended comments</em></div><div class="metric"><span>Vocabulary</span><strong>826</strong><em>terms after processing</em></div><div class="metric"><span>Selected solution</span><strong>4</strong><em>latent codes</em></div></div><p>The four interpreted response classes centered on homelessness; displacement, property taxes, and gentrification; traffic, roads, and tolls; and quality of life / cost of living.</p></div>

  <div class="figure-card"><h3>Figure 6.3. Austin Example: Four-Code Solution and Group Interpretation</h3><svg class="mdcor-flow" viewBox="0 0 1100 560" role="img" aria-label="Four MDCOR codes from Austin example and group interpretation"><defs><marker id="aArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#011F5B"/></marker></defs><rect width="1100" height="560" fill="#fff"/><g font-family="Inter, Arial, sans-serif"><rect x="70" y="70" width="220" height="90" rx="16" fill="#F8FBFF" stroke="#011F5B" stroke-width="2"/><text x="180" y="107" text-anchor="middle" font-size="18" fill="#011F5B" font-weight="700">Code 1</text><text x="180" y="134" text-anchor="middle" font-size="14" fill="#52627C">homelessness</text><rect x="330" y="70" width="220" height="90" rx="16" fill="#FFF0F8" stroke="#E4007C" stroke-width="2"/><text x="440" y="107" text-anchor="middle" font-size="18" fill="#011F5B" font-weight="700">Code 2</text><text x="440" y="134" text-anchor="middle" font-size="14" fill="#52627C">displacement · taxes · gentrification</text><rect x="590" y="70" width="220" height="90" rx="16" fill="#FFF8D6" stroke="#F2C100" stroke-width="2"/><text x="700" y="107" text-anchor="middle" font-size="18" fill="#011F5B" font-weight="700">Code 3</text><text x="700" y="134" text-anchor="middle" font-size="14" fill="#52627C">traffic · roads · tolls</text><rect x="850" y="70" width="220" height="90" rx="16" fill="#EAF7F2" stroke="#0F6E56" stroke-width="2"/><text x="960" y="107" text-anchor="middle" font-size="18" fill="#011F5B" font-weight="700">Code 4</text><text x="960" y="134" text-anchor="middle" font-size="14" fill="#52627C">quality of life · cost of living</text><rect x="245" y="255" width="610" height="100" rx="18" fill="#F6F8FC" stroke="#D6DEED"/><text x="550" y="295" text-anchor="middle" font-size="21" fill="#011F5B" font-weight="700">Post-hoc group association</text><text x="550" y="323" text-anchor="middle" font-size="15" fill="#52627C">home ownership status used to compare code distributions</text><path d="M440,160 C440,220 550,215 550,255" fill="none" stroke="#011F5B" stroke-width="2.5" marker-end="url(#aArrow)"/><path d="M960,160 C960,230 650,220 650,255" fill="none" stroke="#011F5B" stroke-width="2.5" marker-end="url(#aArrow)"/><rect x="245" y="425" width="610" height="70" rx="16" fill="#FFF0F8" stroke="#E4007C"/><text x="550" y="455" text-anchor="middle" font-size="18" fill="#011F5B" font-weight="700">Interpretive result</text><text x="550" y="480" text-anchor="middle" font-size="14" fill="#52627C">Renters were more likely in housing insecurity / affordability related classes.</text></g></svg></div>

  <div class="grid-2"><div class="card pink"><h3>Bias, Quality, and Ethical Review</h3><p>Chapter 6 emphasizes that MDCOR algorithms do not remove bias from input data. If responses contain social bias, harmful language, or unequal participation patterns, those patterns can appear in the classified outputs. Researchers must inspect dropped responses, representative texts, and group associations carefully.</p><p>Because representative responses and code-to-group visualizations can be revealing, local/offline analysis and selective sharing matter for confidentiality and IRB compliance.</p></div><div class="card"><h3>Performance and Scale</h3><p>Chapter 6 reports that MDCOR classified 2,914 responses in approximately 9 minutes on a 12-core Windows machine and 13 minutes on an 8-core Mac. The chapter also notes a much larger example of 500,000 Twitter comments requiring approximately 43 hours on Windows.</p><p>The key point is not only speed; the key point is inspectable, reproducible classification paired with qualitative return.</p></div></div>

  <div class="card gold"><h3>How MDCOR Connects to ISARI</h3><p>MDCOR structures short open-ended responses; ISARI helps researchers interpret those structures. The strongest workflow exports MDCOR outputs — representative responses, classified datasets, metrics plots, intertopic maps, group association tests, and network visualizations — and uses ISARI to draft evidence-grounded memos.</p><div class="mdcor-mini-grid"><div class="outcome"><strong>Code naming</strong><p>Use representative responses to draft tentative code labels and definitions.</p></div><div class="outcome"><strong>Group comparisons</strong><p>Translate mosaic and network outputs into cautious group-comparison prose.</p></div><div class="outcome"><strong>Bias review</strong><p>Ask ISARI to identify where interpretation requires returning to original responses.</p></div><div class="outcome"><strong>Survey reporting</strong><p>Use classified outputs to integrate open-ended comments into quantitative survey reports.</p></div></div></div>

  <div class="card"><h3>Suggested ISARI Prompts for MDCOR Outputs</h3>

    <div class="prompt-card">
      <div class="prompt-title"><span class="badge b-mdcor">MDCOR Prompt</span><h4>Draft code descriptions from representative responses</h4></div>
      <button class="copy" data-copy="mdcorDeepPrompt1">Copy</button>
      <pre id="mdcorDeepPrompt1">I used MDCOR to classify short open-ended responses into [N] latent classes. I am uploading the top 20 representative original responses per class, text contribution, and group fit. Please draft tentative code descriptions, quote representative responses, identify ambiguous cases, and explain what evidence I should review before naming codes definitively.</pre>
    </div>

    <div class="prompt-card">
      <div class="prompt-title"><span class="badge b-mdcor">MDCOR Prompt</span><h4>Interpret MDCOR group associations</h4></div>
      <button class="copy" data-copy="mdcorDeepPrompt2">Copy</button>
      <pre id="mdcorDeepPrompt2">I used MDCOR to compare response classes across [GROUP VARIABLE]. I am uploading the classified dataset, mosaic plot, MCMC/chi-squared output, and representative responses. Please describe the visible group-code patterns, distinguish statistical association from substantive interpretation, and identify which responses should be read before writing findings.</pre>
    </div>

    <div class="prompt-card">
      <div class="prompt-title"><span class="badge b-mdcor">MDCOR Prompt</span><h4>Compare interactive summaries and original responses</h4></div>
      <button class="copy" data-copy="mdcorDeepPrompt3">Copy</button>
      <pre id="mdcorDeepPrompt3">I am uploading MDCOR intertopic maps, word-frequency summaries, and original representative responses. Please compare the visible word/code structure with the actual response language, flag where word frequencies could mislead interpretation, and draft a cautious analytic memo.</pre>
    </div>
  </div>

  <div class="card dark"><h3>Bottom line</h3><p>MDCOR democratizes qualitative and mixed-methods analysis of open-ended survey evidence by making unsupervised classification, text mining, metrics assessment, interactive visualization, group comparison, and exportable data products available through a no-code workflow. Like LACOID, its outputs are not findings by themselves: they are structured guides that return researchers to original participant language.</p></div>

    <h2>SENA: Sentiment and Emotion Network Analysis</h2>
    <div class="pink-line"></div>
    <p class="lead"><strong>SENA</strong> expands sentiment and emotion analysis from mostly aggregate text analytics into a comparative, network-based framework for qualitative and mixed-methods research. Chapter 7 positions SENA as a free, no-code, locally executable software ecosystem for analyzing sentiment and emotion distributions across individuals, groups, time points, topics, and other attributes.</p>
    <p>SENA uses natural language processing, lexicon-based sentiment/emotion detection, word-cloud summaries, histograms, sociograms, emotional entropy, and Quadratic Assignment Procedure (QAP) testing. The framework is designed to avoid aggregation bias by making group and individual variation visible while preserving privacy through local processing.</p>
  </div>

  <div class="quote-block"><p>Sentiment and emotion outputs are not conclusions. SENA provides structured evidence for interpretation by returning researchers to group differences, individual-level patterns, and original qualitative texts.</p><cite>Based on Chapter 7, “Sentiment and Emotion Network Analysis (SENA).”</cite></div>

  <div class="grid-2">
    <div class="card gold"><h3>Why SENA Matters</h3><p>Sentiment and emotion analysis can rapidly summarize large bodies of text, but conventional SEA often aggregates outcomes and masks group-level differences. Chapter 7 argues that aggregation bias is a central limitation when researchers want to understand lived experience, subgroup variation, or qualitative nuance.</p><p>SENA responds by combining SEA with network modeling and group comparison so researchers can compare emotional distributions rather than relying only on aggregate positive/negative summaries.</p></div>
    <div class="card"><h3>Academic Repositioning</h3><p>Chapter 7 repositions sentiment and emotion analysis beyond marketing, reviews, and political monitoring. SENA is built for educational, social, qualitative, and mixed-methods research where original text, confidentiality, and interpretive accountability matter.</p><div class="sena-callout"><strong>Practical rule:</strong> use SENA to identify emotional structure and difference; then return to the original texts and study context before writing claims.</div></div>
  </div>

  <div class="card"><h3>SENA Workflow: Seven Steps plus Reset</h3><div class="grid-2"><div><div class="sena-stage"><strong>1. Select source format</strong><p>Choose Microsoft Word documents or a spreadsheet/CSV database. Word filenames can encode attributes; spreadsheet columns can hold IDs, text, and attributes.</p></div><div class="sena-stage"><strong>2. Upload and define attributes</strong><p>Group, individual, temporal, or intersectional attributes can be extracted from filenames or selected from database columns.</p></div><div class="sena-stage"><strong>3. Lemmatize and text-mine</strong><p>Lemmatization is preferred over stemming because it better preserves meaning. Researchers should run sensitivity checks with and without lemmatization when appropriate.</p></div><div class="sena-stage"><strong>4. Trim vocabulary</strong><p>SENA removes stop words and uncommon terms; researchers can also remove extremely frequent terms such as prompt words that do not support interpretation.</p></div></div><div><div class="sena-stage"><strong>5. Select lexicon language</strong><p>SENA supports 17 languages and applies sentiment/emotion dictionaries to identify positive/negative sentiment and eight NRC emotions.</p></div><div class="sena-stage"><strong>6. Execute SENA</strong><p>Outputs include word clouds, sentiment/emotion histograms, network sociograms, entropy values, and downloadable statistical artifacts.</p></div><div class="sena-stage"><strong>7. Compare groups and individuals</strong><p>QAP testing, network projections, and dyadic comparisons reveal whether sentiment/emotion distributions differ across groups.</p></div><div class="sena-stage"><strong>8. Optional reload/reset</strong><p>Reset the interface or switch formats when conducting sensitivity checks or changing analytic input structure.</p></div></div></div></div>

  <div class="card green"><h3>Lexicon, Emotions, and Entropy</h3><p>SENA uses lexicon-based NLP procedures rather than server-based generative AI. Chapter 7 highlights the NRC Emotion Lexicon: eight emotions — anger, fear, anticipation, trust, surprise, sadness, joy, and disgust — plus positive and negative sentiment. This makes SENA useful for structured, inspectable analysis when privacy and reproducibility matter.</p><div class="grid-3"><div class="metric"><span>Emotion categories</span><strong>8</strong><em>NRC emotions</em></div><div class="metric"><span>Sentiment categories</span><strong>2</strong><em>positive / negative</em></div><div class="metric"><span>Lexicon languages</span><strong>17</strong><em>supported</em></div></div><p><strong>Emotional entropy</strong> measures unpredictability or mixed emotional messaging. Chapter 7 describes normalized entropy from 0 to 1, with higher values indicating more mixed or contradictory sentiment patterns and lower values indicating more consistency.</p></div>
