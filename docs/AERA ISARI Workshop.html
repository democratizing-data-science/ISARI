  <div class="card"><h3>SENA Outputs and Interpretive Uses</h3><table><thead><tr><th>Output</th><th>What it contains</th><th>How researchers should use it</th></tr></thead><tbody><tr><td><strong>Word clouds</strong></td><td>Top words by aggregate or group, with frequency visible through size/color and hover in interactive versions.</td><td>Use to assess textual content and decide whether common words should be trimmed; do not interpret word size as meaning by itself.</td></tr><tr><td><strong>Sentiment/emotion histograms</strong></td><td>Positive/negative sentiment and eight emotion categories, with aggregate or group-disaggregated panels.</td><td>Use to identify distributions and potential subgroup differences before returning to the original text.</td></tr><tr><td><strong>Network sociograms</strong></td><td>Bipartite text-emotion networks and projected emotion networks, including node size and centrality patterns.</td><td>Use to see which emotions bridge groups or actors and where case-level follow-up is needed.</td></tr><tr><td><strong>QAP comparison PDFs</strong></td><td>Permutation-based correlation tests for dyadic group comparisons, density plots, and significance lines.</td><td>Use to support claims about similarity or divergence in emotion distributions across groups.</td></tr><tr><td><strong>Entropy estimates</strong></td><td>Individual and group-level measures of mixed, unpredictable, or consistent sentiment patterns.</td><td>Use to flag texts or groups with contradictory signals for deeper qualitative interpretation.</td></tr><tr><td><strong>Portable HTML outputs</strong></td><td>Interactive visualizations that can be opened, shared selectively, or imported as screenshots into ISARI.</td><td>Use for auditability, local memoing, comparison, and evidence-grounded writing.</td></tr></tbody></table></div>

  <div class="card gold"><h3>Chapter 7 Applications</h3><div class="grid-2"><div class="outcome"><strong>Small data: student essays</strong><p>Chapter 7 demonstrates SENA with 99 student essays from Guangzhou Institute in summer 2024. The example includes 50 men and 49 women, uses attribute-based comparison, and shows how aggregate results can mask group differences.</p></div><div class="outcome"><strong>Large data: social media comments</strong><p>Chapter 7 also describes a large-scale application with 22,995 YouTube comments connected to a July 13, 2024 public event. MDCOR classifies topics first, then SENA compares sentiment/emotion distributions across learned topics.</p></div></div><div class="grid-4"><div class="metric"><span>Small-data essays</span><strong>99</strong><em>student essays</em></div><div class="metric"><span>Example groups</span><strong>50 / 49</strong><em>two-group comparison</em></div><div class="metric"><span>Big-data comments</span><strong>22,995</strong><em>YouTube comments</em></div><div class="metric"><span>ML topics</span><strong>7</strong><em>MDCOR + SENA</em></div></div></div>

  <div class="figure-card"><h3>Figure 7.3. Network, Entropy, and QAP Logic</h3><svg class="sena-flow" viewBox="0 0 1120 600" role="img" aria-label="SENA network and QAP logic"><rect width="1120" height="600" fill="#fff"/><g font-family="Inter, Arial, sans-serif"><line x1="270" y1="170" x2="500" y2="170" stroke="#D6DEED" stroke-width="8"/><line x1="270" y1="265" x2="500" y2="265" stroke="#D6DEED" stroke-width="5"/><line x1="270" y1="360" x2="500" y2="360" stroke="#D6DEED" stroke-width="3"/><circle cx="175" cy="170" r="52" fill="#F8FBFF" stroke="#011F5B" stroke-width="3"/><text x="175" y="176" text-anchor="middle" font-size="15" fill="#011F5B" font-weight="700">Group A</text><circle cx="175" cy="265" r="42" fill="#FFF8D6" stroke="#F2C100" stroke-width="3"/><text x="175" y="270" text-anchor="middle" font-size="15" fill="#011F5B" font-weight="700">Group B</text><circle cx="175" cy="360" r="35" fill="#FFF0F8" stroke="#E4007C" stroke-width="3"/><text x="175" y="365" text-anchor="middle" font-size="15" fill="#011F5B" font-weight="700">Group C</text><circle cx="585" cy="155" r="42" fill="#EAF7F2" stroke="#0F6E56" stroke-width="3"/><text x="585" y="160" text-anchor="middle" font-size="14" fill="#011F5B" font-weight="700">trust</text><circle cx="585" cy="265" r="48" fill="#F8FBFF" stroke="#011F5B" stroke-width="3"/><text x="585" y="270" text-anchor="middle" font-size="14" fill="#011F5B" font-weight="700">fear</text><circle cx="585" cy="375" r="38" fill="#FFF0F8" stroke="#E4007C" stroke-width="3"/><text x="585" y="380" text-anchor="middle" font-size="14" fill="#011F5B" font-weight="700">joy</text><rect x="730" y="105" width="310" height="125" rx="18" fill="#F6F8FC" stroke="#D6DEED"/><text x="885" y="145" text-anchor="middle" font-size="18" fill="#011F5B" font-weight="700">Entropy</text><text x="885" y="174" text-anchor="middle" font-size="14" fill="#52627C">0 = consistent</text><text x="885" y="198" text-anchor="middle" font-size="14" fill="#52627C">1 = mixed or contradictory</text><rect x="730" y="295" width="310" height="145" rx="18" fill="#FFF8D6" stroke="#F2C100"/><text x="885" y="335" text-anchor="middle" font-size="18" fill="#011F5B" font-weight="700">QAP comparisons</text><text x="885" y="365" text-anchor="middle" font-size="14" fill="#52627C">C(n,2) dyadic tests</text><text x="885" y="389" text-anchor="middle" font-size="14" fill="#52627C">50,000 permutations</text><text x="885" y="413" text-anchor="middle" font-size="14" fill="#52627C">correlation + significance</text><text x="560" y="525" text-anchor="middle" font-size="18" fill="#011F5B" font-weight="700">SENA turns emotion distributions into inspectable networks and statistically comparable matrices.</text></g></svg></div>

  <div class="grid-2"><div class="card pink"><h3>Aggregation Bias and Group Differences</h3><p>Chapter 7 repeatedly shows why aggregate SEA can be misleading. Aggregate charts may indicate one dominant sentiment pattern, while subgroup or individual outputs reveal different emotional structures. SENA counters this by supporting group, individual, temporal, topic-based, and intersectional comparisons.</p><p>In the student essay example, subgroup analysis revealed more detail than aggregate analysis, including differences in positive sentiment, trust, anger, disgust, and entropy.</p></div><div class="card"><h3>Privacy, Local Execution, and Sharing</h3><p>SENA is locally executable and lexicon-based. Chapter 7 emphasizes that local processing reduces confidentiality risks because texts do not need to be uploaded to external servers. Interactive outputs can be shared only when anonymization, permission, and confidentiality conditions are met.</p><p>For sensitive studies, Chapter 7 recommends local storage, restricted sharing, and using screenshots or excerpts instead of full raw outputs.</p></div></div>

  <div class="card green"><h3>How SENA Connects to LACOID, MDCOR, and ISARI</h3><p>SENA can operate after machine-learning text classification. For example, MDCOR can first retrieve latent topics/classes from a large comment corpus; SENA can then test whether sentiment and emotion distributions differ across those topics. This makes SENA part of a broader qualitative data science ecosystem where classification, sentiment/emotion modeling, and human interpretation reinforce each other.</p><div class="sena-mini-grid"><div class="outcome"><strong>After MDCOR</strong><p>Compare sentiment and emotion distributions across machine-learned response topics.</p></div><div class="outcome"><strong>After LACOID</strong><p>Use latent codes as attributes for emotion comparison and QAP testing.</p></div><div class="outcome"><strong>Inside ISARI</strong><p>Upload SENA outputs for local memoing, comparison, and evidence-grounded prose.</p></div><div class="outcome"><strong>For ethics</strong><p>Keep sensitive text and outputs local; share only anonymized summaries where appropriate.</p></div></div></div>

  <div class="card"><h3>Suggested ISARI Prompts for SENA Outputs</h3>

    <div class="prompt-card">
      <div class="prompt-title"><span class="badge b-sena">SENA Prompt</span><h4>Interpret group-level SENA outputs</h4></div>
      <button class="copy" data-copy="senaDeepPrompt1">Copy</button>
      <pre id="senaDeepPrompt1">I used SENA to compare sentiment and emotion distributions across [GROUP VARIABLE]. I am uploading word clouds, sentiment/emotion histograms, sociograms, entropy summaries, and QAP output. Please describe the group-level patterns, distinguish descriptive differences from statistically supported differences, and identify which original texts should be reviewed before writing findings.</pre>
    </div>

    <div class="prompt-card">
      <div class="prompt-title"><span class="badge b-sena">SENA Prompt</span><h4>Use SENA after MDCOR or LACOID</h4></div>
      <button class="copy" data-copy="senaDeepPrompt2">Copy</button>
      <pre id="senaDeepPrompt2">I first classified qualitative texts with [MDCOR/LACOID] and then used SENA to analyze sentiment and emotion distributions across the learned codes/topics. Please compare the codes/topics by sentiment, emotion, entropy, and QAP results; identify where emotion differences deepen the code interpretation; and draft cautious mixed-methods memo language.</pre>
    </div>

    <div class="prompt-card">
      <div class="prompt-title"><span class="badge b-sena">SENA Prompt</span><h4>Audit aggregation bias in sentiment analysis</h4></div>
      <button class="copy" data-copy="senaDeepPrompt3">Copy</button>
      <pre id="senaDeepPrompt3">I have aggregate SENA outputs and subgroup/individual SENA outputs. Please identify where aggregate sentiment or emotion patterns hide subgroup differences, explain the risk of aggregation bias, and recommend which visualizations and original texts should be included in an evidence-grounded report.</pre>
    </div>
  </div>

  <div class="card dark"><h3>Bottom line</h3><p>SENA democratizes sentiment and emotion analysis for qualitative and mixed-methods researchers by combining local NLP, lexicon-based emotion detection, emotional entropy, network modeling, QAP testing, and portable interactive outputs. Its value is not automatic interpretation; its value is making emotional structure visible so researchers can return to original texts with stronger, more transparent analytic questions.</p></div>

  <div class="hero">
    <span class="badge b-geo">GeoStoryTelling</span>
    <h2>GeoStoryTelling: Geo-Contextualized Qualitative Evidence</h2>
    <div class="pink-line"></div>
    <p class="lead"><strong>GeoStoryTelling is a no-code, cost-free, multiplatform framework and software environment for turning qualitative, ethnographic, survey, multimedia, and mixed-method evidence into interactive geo-contextualized narratives.</strong></p>
    <p>Chapter 8 positions GeoStoryTelling as a method for linking narratives to coordinates, places, routes, multimedia, hyperlinks, and contextual detail. The resulting portable HTML maps help researchers study how stories unfold across space, place, and time while preserving interpretive responsibility.</p>
  </div>

  <div class="quote-block"><p>GeoStoryTelling does not turn maps into findings. GeoStoryTelling turns mapped narratives into better questions about place, context, mobility, access, memory, and interpretation.</p><cite>Based on Chapter 8, “GeoStoryTelling.”</cite></div>

  <div class="grid-2">
    <div class="card green"><h3>Why Geo-Contextualization Matters</h3><p>Chapter 8 begins from a central qualitative premise: life stories are shaped by place. Neighborhoods, schools, parks, streets, institutions, cultural sites, routes, and perceived boundaries can influence beliefs, experiences, opportunities, risks, and mobility.</p><p>GeoStoryTelling helps researchers make spatial context visible without requiring specialized GIS programming or proprietary platforms.</p></div>
    <div class="card"><h3>Spaces, Places, and “Splaces”</h3><p>The chapter distinguishes <strong>spaces</strong> as measurable or abstract geographic locations and <strong>places</strong> as meaningful, experienced, socially interpreted locations. GeoStoryTelling combines location and meaning into what Chapter 8 describes as <strong>splaces</strong>: georeferenced stories enriched by local context.</p><div class="geo-callout"><strong>Practical rule:</strong> map narratives to enrich interpretation, then return to original evidence and participant context before making claims.</div></div>
  </div>

  <div class="card"><h3>Table 8.1 Recreated: GeoStoryTelling Database Structure</h3><p>Chapter 8’s Table 8.1 shows how a simple spreadsheet becomes the foundation for an interactive GeoStory. Only latitude and longitude are technically required for mapping, but the richer columns support narrative, multimedia, and contextual interpretation.</p>
    <table><thead><tr><th>Column</th><th>Purpose</th><th>Example / note</th></tr></thead><tbody>
      <tr><td><strong>Name or ID</strong></td><td>Identifies participant, case, story, event, or time-stamped mini-story.</td><td>IDa, t=1; IDa, t=2; multiple rows can represent one person or case across time.</td></tr>
      <tr><td><strong>Location or Address</strong></td><td>Human-readable place name, address, city, institution, or region.</td><td>Mérida, Spain; Los Angeles, CA; a school, museum, neighborhood, or route point.</td></tr>
      <tr><td><strong>Link to Webpage</strong></td><td>Optional external context that enriches the mapped story.</td><td>A museum page, public article, institutional site, or project resource.</td></tr>
      <tr><td><strong>Video/Image/Audio Link</strong></td><td>Optional multimedia source; the software auto-detects embedded media, web images, and local images.</td><td>YouTube/Vimeo iframe, SoundCloud iframe, web image URL, or local image path.</td></tr>
      <tr><td><strong>Longitude</strong></td><td>Required coordinate indicating east-west position.</td><td>Values range from −180 to 180; many locations in the Americas use negative longitudes.</td></tr>
      <tr><td><strong>Latitude</strong></td><td>Required coordinate indicating north-south position.</td><td>Values range from −90 to 90; positive values are north of the Equator.</td></tr>
      <tr><td><strong>GeoStory</strong></td><td>The qualitative narrative, excerpt, observation, survey response, or story connected to the place.</td><td>Can include short quotes, longer contextual notes, or time-stamped mini-stories.</td></tr>
    </tbody></table>
  </div>

  <div class="grid-2">
    <div class="card gold"><h3>Database Build: Panels A–D</h3><div class="geo-stage"><strong>Panel A: Empty state</strong><p>Create the seven-column structure in Excel, Google Sheets, or another spreadsheet editor.</p></div><div class="geo-stage"><strong>Panel B: Add stories</strong><p>Populate narrative rows. Multiple stories can belong to the same participant or case, and time stamps can be nonlinear.</p></div><div class="geo-stage"><strong>Panel C: Geolocate stories</strong><p>Use Google Maps, Bing Maps, GPS Visualizer, or batch geocoding to add latitude and longitude.</p></div><div class="geo-stage"><strong>Panel D: Add media and links</strong><p>Insert hyperlinks, images, audio, or video to contextualize each GeoStory.</p></div></div>
    <div class="card"><h3>Data Sources GeoStoryTelling Can Use</h3><ul class="redlines"><li>Interview transcripts and open-ended survey responses</li><li>Ethnographic observations, field notes, and videographies</li><li>Participant reflections, essays, social media posts, and multimedia narratives</li><li>Campus safety incidents, mobility stories, community narratives, and investigative reporting evidence</li></ul><p class="caption">Chapter 8 recommends purposeful selection rather than exhaustive mapping: the map should serve interpretation, not overwhelm it.</p></div>

  <div class="card green"><h3>Geocoding, Multimedia, and Distance</h3><div class="grid-3"><div class="metric"><span>Required coordinate columns</span><strong>2</strong><em>latitude + longitude</em></div><div class="metric"><span>Database columns</span><strong>7</strong><em>recommended structure</em></div><div class="metric"><span>Software access</span><strong>Mac / Win</strong><em>local, no-code workflow</em></div></div><table><thead><tr><th>Feature</th><th>Chapter 8 guidance</th><th>Analytic value</th></tr></thead><tbody><tr><td><strong>Batch geocoding</strong></td><td>Use tools such as GPS Visualizer, Bing Maps, or Google Maps to convert addresses or place names to coordinates.</td><td>Scales projects from a few stories to many locations.</td></tr><tr><td><strong>Multimedia</strong></td><td>Add web images, local images, iframes for audio/video, and external links.</td><td>Builds richer contextual evidence around mapped narratives.</td></tr><tr><td><strong>Straight-line distance</strong></td><td>“As the crow flies” estimates direct distance between points.</td><td>Useful as a quick spatial comparison.</td></tr><tr><td><strong>Route tracing</strong></td><td>Editable path-based lines approximate walking, driving, or lived mobility routes.</td><td>Better for access, burden, commute, and intervention questions.</td></tr></tbody></table></div>

  <div class="grid-2"><div class="card pink"><h3>Ethics and Risk</h3><p>GeoStoryTelling can increase interpretive power, but Chapter 8 is clear that place-based narrative maps can also increase disclosure risk. A mapped location may reveal sensitive information even when names are removed.</p><ul class="redlines"><li>Use participant validation and interactive reviewability where appropriate.</li><li>Generalize, mask, or omit locations when mapping creates risk.</li><li>Share HTML maps selectively and only when consent and confidentiality allow.</li><li>Treat maps, screenshots, route traces, and multimedia as sensitive research artifacts.</li></ul></div><div class="card"><h3>Limitations and Design Choices</h3><p>Chapter 8 avoids making place-based quantitative indicators mandatory because merging shapefiles, census attributes, and temporal indicators can require GIS/statistical programming and may compromise the tool’s no-code accessibility.</p><p>The chapter instead emphasizes qualitative contextualization through stories, images, video, audio, hyperlinks, participant agency, and careful analytic return.</p></div></div>

  <div class="card gold"><h3>Application Example: Survey Responses and Campus Safety</h3><p>Chapter 8 describes GeoStoryTelling as applicable to open-ended survey responses involving campus safety and incident locations. Researchers can collect descriptions, location of incident, and contextual identifiers; then batch geocode those locations, classify narratives if useful, and visualize patterns while protecting participant identity.</p><div class="geo-callout"><strong>Analytic stance:</strong> maps can reveal where experiences cluster, but the research team must still interpret why those patterns matter and whether location disclosure is ethically appropriate.</div></div>

  <div class="card green"><h3>Integration with ISARI</h3><p>GeoStoryTelling outputs — interactive maps, screenshots, multimedia popups, route traces, distance comparisons, and CSV tables — can be brought into ISARI for offline memoing, comparison, and evidence-grounded prose. This keeps spatial interpretation aligned with the dashboard’s privacy-conscious local workflow.</p><p>ISARI can help draft explanatory contrasts, compare locations or trajectories, summarize route burdens, and flag overclaims — but the mapped stories and participants’ own accounts remain the basis of interpretation.</p></div>

  <div class="card"><h3>Suggested ISARI Prompts for GeoStoryTelling Outputs</h3>

    <div class="prompt-card">
      <div class="prompt-title"><span class="badge b-geo">GeoStoryTelling Prompt</span><h4>Interpret a GeoStory map</h4></div>

    </div>

    <div class="prompt-card">
      <div class="prompt-title"><span class="badge b-geo">GeoStoryTelling Prompt</span><h4>Audit location-disclosure risk</h4></div>
      <button class="copy" data-copy="geoPrompt2">Copy</button>
      <pre id="geoPrompt2">I am preparing to share GeoStoryTelling outputs. Please review the mapped locations, multimedia, and story excerpts for possible reidentification risk; suggest masking, aggregation, generalization, or omission strategies; and keep all recommendations aligned with consent and IRB expectations.</pre>
    </div>

    <div class="prompt-card">
      <div class="prompt-title"><span class="badge b-geo">GeoStoryTelling Prompt</span><h4>Write a place-based analytic memo</h4></div>
      <button class="copy" data-copy="geoPrompt3">Copy</button>
      <pre id="geoPrompt3">Using these GeoStoryTelling outputs and selected excerpts, draft a cautious analytic memo about how place, mobility, local context, and participant narratives interact. Separate directly supported claims from interpretations requiring additional evidence or participant validation.</pre>
    </div>
  </div>

  <div class="card dark"><h3>Bottom line</h3><p>GeoStoryTelling adds the spatial and multimedia dimension to the dashboard’s qualitative data science ecosystem. It turns qualitative evidence into interactive geonarratives without requiring GIS expertise, but it keeps interpretation, ethics, participant protection, and qualitative return at the center.</p></div>

    <h2>ISARI as the Integration Layer for Qualitative Data Science</h2>
    <div class="pink-line"></div>
    <p class="lead"><strong>Chapter 9 strengthens the Integration tab by positioning ISARI — Intelligent Systems for Academic Research Integration — as the local, offline, open-source interpretive partner that comes after LACOID, MDCOR, SENA, NAQD, GRATIS, VERITAS, and GeoStoryTelling have structured evidence.</strong></p>
    <p>ISARI does not replace those frameworks. It helps researchers compare outputs, draft memos, translate visual results into prose, synthesize findings, and maintain a truly equal status design in which computational, visual, quantitative, and qualitative evidence remain interdependent rather than hierarchical.</p>

  <div class="quote-block"><p>ISARI is not an answer machine. It is a local brainstorming environment that helps researchers return to evidence with stronger questions, clearer memos, and more accountable interpretations.</p><cite>Based on Chapter 9, Integration through ISARI and local AI-assisted scholarly reasoning.</cite></div>

  <div class="grid-2">
    <div class="card pink"><h3>The Integration Problem</h3><p>The dashboard’s analytic tools solve different methodological problems: long text classification, short response classification, sentiment and emotion comparison, participant-code networks, temporal replay, synchronous interaction mapping, and geo-contextualized interpretation. The challenge is what happens after these outputs are produced.</p><p>Chapter 9 answers that challenge with ISARI: a private scholarly reasoning layer for reading across text, images, visualizations, screenshots, networks, maps, and tables.</p></div>
    <div class="card"><h3>TESD Commitment</h3><p>In truly equal status design, computational and visual outputs are analytic guides, not final findings. ISARI helps transform those guides into evidence-grounded memos and prose while preserving researcher authority, qualitative return, and ethical data stewardship.</p><div class="integration-callout"><strong>Practical rule:</strong> ask ISARI to compare, describe, and memo from evidence; never ask it to treat a chart, network, map, or model output as self-interpreting.</div></div>

  <div class="card gold"><h3>ISARI’s Place in the Analytic Ecosystem</h3><div class="grid-2"><div><div class="integration-stage"><strong>LACOID</strong><p>Structures long-form textual evidence and reduces latent code aggregation bias. ISARI helps describe code meanings, compare solutions, organize quotations, and draft interpretive memos.</p></div><div class="integration-stage"><strong>MDCOR</strong><p>Classifies short open-ended responses. ISARI helps summarize class patterns, compare group associations, and translate representative responses into cautious prose.</p></div><div class="integration-stage"><strong>SENA</strong><p>Models sentiment and emotion distributions. ISARI helps interpret emotional structure, entropy, group differences, network diagrams, and QAP comparisons.</p></div><div class="integration-stage"><strong>NAQD</strong><p>Turns qualitative codes and participants into network structures. ISARI helps bridge sociograms, centrality, community detection, and hypothesis-testing outputs into qualitative explanation.</p></div></div><div><div class="integration-stage"><strong>GRATIS</strong><p>Visualizes chronological evolution and dynamic networks. ISARI helps interpret temporal phases, transitions, event sequences, and replay diagrams.</p></div><div class="integration-stage"><strong>VERITAS</strong><p>Maps synchronous interaction and visual replay. ISARI helps compare interaction episodes, multimodal frames, and evidence across time-coded displays.</p></div><div class="integration-stage"><strong>GeoStoryTelling</strong><p>Connects qualitative evidence to geographic and multimedia contexts. ISARI helps interpret maps, route traces, place markers, and spatial narratives.</p></div><div class="integration-stage"><strong>Cross-framework synthesis</strong><p>ISARI helps ask: what do classification, network, emotion, temporal, visual, and spatial outputs jointly support — and what still requires researcher verification?</p></div></div></div></div>

  <div class="card green"><h3>ISARI Brains: What to Choose and Why</h3><p>Chapter 9 emphasizes that ISARI’s multiple local brains have different strengths. Smaller models are useful for concise summaries and memoing; mid-sized models support procedural reasoning and workflow logic; larger and vision-capable models support long-context synthesis and image-based evidence.</p><div class="brain-pill">Gemma 3: multilingual summaries + visual grounding</div><div class="brain-pill">Phi-4 Mini: lightweight concise reasoning</div><div class="brain-pill">Qwen2.5 Coder: structured reasoning + reproducible workflows</div><div class="brain-pill">DeepSeek R1 distill: deeper synthesis and reasoning</div><div class="brain-pill">Qwen2.5-VL: OCR, scanned pages, bilingual figures</div><div class="brain-pill">Llama 3.2 Vision: high-detail visual description</div><p class="caption">The lightest configuration is presented as usable on modest hardware, while larger and vision-capable brains expand the range of multimodal evidence ISARI can interpret locally.</p></div>

  <div class="card"><h3>Prompting Principles for Evidence-Grounded Integration</h3><table><thead><tr><th>Principle</th><th>How to operationalize it in ISARI</th></tr></thead><tbody><tr><td><strong>Name the prior framework</strong></td><td>Tell ISARI whether the evidence came from LACOID, MDCOR, SENA, NAQD, GRATIS, VERITAS, GeoStoryTelling, or a combination.</td></tr><tr><td><strong>Specify supplied outputs</strong></td><td>Describe whether you are uploading code tables, representative excerpts, sociograms, QAP PDFs, word clouds, maps, replay frames, screenshots, or field notes.</td></tr><tr><td><strong>Define a bounded task</strong></td><td>Ask for a memo, comparison, contrast, visual description, quote organization, or prose draft rather than a vague “interpret this.”</td></tr><tr><td><strong>Request evidentiary grounding</strong></td><td>Ask ISARI to separate claims directly supported by evidence from claims that require original-text verification or researcher judgment.</td></tr><tr><td><strong>Invite caution</strong></td><td>Require caveats, ambiguity flags, and reminders to return to original participant language or visual context.</td></tr></tbody></table></div>

  <div class="grid-2"><div class="card pink"><h3>Why Vision-Capable Brains Matter</h3><p>Chapter 9 highlights vision-capable language models because many qualitative data science outputs are visual: network graphs, cluster diagrams, timelines, replay frames, maps, heatmaps, spatial storyboards, scanned pages, and multilingual figures. These outputs can be as sensitive as raw text.</p><p>ISARI lets researchers describe and memo about those visual outputs locally, rather than moving them into external cloud systems.</p></div><div class="card"><h3>Ethical Infrastructure</h3><p>ISARI is presented as ethical infrastructure, not merely productivity software. Local execution helps protect anonymity, confidentiality, consent expectations, and IRB-aligned data stewardship.</p><p>The Integration tab therefore treats local AI as part of method: privacy-preserving interpretation is central when working with participant text, screenshots, networks, maps, and visual artifacts.</p></div></div>

  <div class="card"><h3>Framework-Specific ISARI Prompts</h3>

    <div class="prompt-card">
      <div class="prompt-title"><span class="badge b-isari">Integration Prompt</span><h4>Cross-framework integration memo</h4></div>
      <button class="copy" data-copy="integrationDeepPrompt1">Copy</button>
      <pre id="integrationDeepPrompt1">I am uploading outputs from [LACOID/MDCOR/SENA/NAQD/GRATIS/VERITAS/GeoStoryTelling]. Please identify what each framework contributes, where findings converge or diverge, what claims are directly supported, what requires checking against original evidence, and how to draft an integrative memo under truly equal status design.</pre>
    </div>

    <div class="prompt-card">
      <div class="prompt-title"><span class="badge b-isari">Integration Prompt</span><h4>Vision-brain visual-to-prose translation</h4></div>
      <button class="copy" data-copy="integrationDeepPrompt2">Copy</button>
      <pre id="integrationDeepPrompt2">I am uploading a visual output from [network graph/timeline/replay frame/map/screenshot]. Please describe the visual structure carefully, identify visible patterns, connect those patterns to the prior analytic framework, and flag any interpretation that cannot be supported without original text or metadata.</pre>
    </div>

    <div class="prompt-card">
      <div class="prompt-title"><span class="badge b-isari">Integration Prompt</span><h4>Evidence-grounded writing audit</h4></div>
      <button class="copy" data-copy="integrationDeepPrompt3">Copy</button>
      <pre id="integrationDeepPrompt3">I drafted a findings paragraph using outputs from multiple analytic tools. Please audit the paragraph for overclaiming, unsupported causal language, insufficient qualitative return, missing caveats, and places where original participant evidence or visual context should be cited.</pre>
    </div>
  </div>

  <div class="card dark"><h3>Bottom line</h3><p>Chapter 9 transforms the Integration tab from a simple bridge into a methodological architecture: analytic frameworks structure evidence, ISARI supports local and multimodal scholarly reasoning, and researchers retain interpretive authority. Integration is therefore not automation; it is a privacy-preserving, evidence-grounded, recursively verifiable workflow for turning qualitative data science outputs into accountable scholarly claims.</p></div>
</section>`,prompts:`<section><div class="hero"><span class="badge b-isari">Prompt Lab</span><h2>Prompt Lab: A Searchable Library of ISARI Prompts</h2><div class="pink-line"></div><p class="lead">Filter by tool or task type to find the right starting prompt. Copy and adapt for your research context. Always specify your framework, outputs, task, and evidentiary grounding.</p><input id="promptSearch" class="search" placeholder="Search prompts by tool, task, entropy, QAP, vision, integration..."></div><div class="prompt-library">
    <div class="prompt-card" data-kind="lacoid">
      <div class="prompt-title"><span class="badge b-lacoid">LACOID</span><h4>First-Pass Code Description from Long Texts</h4></div>
      <button class="copy" data-copy="plab0">Copy</button>
      <pre id="plab0">I used LACOID (sentence decomposition) to classify [N] interview transcripts into [N] latent codes. I am uploading the top 20 most representative original text chunks per code, each with document ID and sentence position. Please describe what each code appears to be about, quote representative text, and identify ambiguities requiring surrounding context.</pre>
    </div>
    
    <div class="prompt-card" data-kind="lacoid">
      <div class="prompt-title"><span class="badge b-lacoid">LACOID</span><h4>Comparing 3-Code vs. 7-Code Solutions</h4></div>
      <button class="copy" data-copy="plab1">Copy</button>
      <pre id="plab1">I ran LACOID and obtained two plausible solutions: 3 codes and 7 codes. I am uploading representative texts for both. Compare what is gained and lost, which codes split or merge, where overlap may indicate LCAB, and what I should check in the full distribution dataset.</pre>
    </div>
    
    <div class="prompt-card" data-kind="mdcor">
      <div class="prompt-title"><span class="badge b-mdcor">MDCOR</span><h4>Thematic Summary of 4 Codes</h4></div>
      <button class="copy" data-copy="plab2">Copy</button>
      <pre id="plab2">I used MDCOR to classify open-ended responses about [TOPIC] into 4 latent codes. I am uploading the top 20 most representative original responses for each code. Please provide code names, descriptions, and illustrative quotations while noting short-response limitations.</pre>
    </div>
    
    <div class="prompt-card" data-kind="mdcor">
      <div class="prompt-title"><span class="badge b-mdcor">MDCOR</span><h4>Interpreting the Chi-Squared / Group Mosaic</h4></div>
      <button class="copy" data-copy="plab3">Copy</button>
      <pre id="plab3">I ran MDCOR and conducted a group-code association test by [VARIABLE]. I am uploading the mosaic plot and code meanings. Please interpret group-code associations and distinguish statistical evidence from qualitative interpretation.</pre>
    </div>
    
    <div class="prompt-card" data-kind="sena">
      <div class="prompt-title"><span class="badge b-sena">SENA</span><h4>Emotional Entropy — Identifying Texts for Follow-Up</h4></div>
      <button class="copy" data-copy="plab4">Copy</button>
      <pre id="plab4">I ran SENA on [N] texts grouped by [VARIABLE]. I am uploading entropy outputs and high/low entropy texts. Please compare high- and low-entropy texts, quote directly, and indicate where entropy may reflect sarcasm, complexity, contradiction, or ambivalence.</pre>
    </div>
    
    <div class="prompt-card" data-kind="sena">
      <div class="prompt-title"><span class="badge b-sena">SENA</span><h4>Writing About QAP Results</h4></div>
      <button class="copy" data-copy="plab5">Copy</button>
      <pre id="plab5">I used SENA to compare emotion distributions across [GROUP A] and [GROUP B] using QAP. Please draft a methods-and-findings paragraph explaining QAP in plain language, interpreting observed Rho, and distinguishing statistical results from qualitative interpretation.</pre>
    </div>
    
    <div class="prompt-card" data-kind="integration">
      <div class="prompt-title"><span class="badge b-isari">Integration</span><h4>Drafting an Integrative Discussion Section</h4></div>
      <button class="copy" data-copy="plab6">Copy</button>
      <pre id="plab6">I completed thematic classification and emotion analysis on the same corpus. I am uploading code names, representative texts, SENA plots, QAP results, and notes. Please draft an initial discussion section integrating thematic and emotional layers, with quotations and clear uncertainty.</pre>
    </div>
    
    <div class="prompt-card" data-kind="vision">
      <div class="prompt-title"><span class="badge b-isari">Vision</span><h4>Describing a SENA Network Sociogram</h4></div>
      <button class="copy" data-copy="plab7">Copy</button>
      <pre id="plab7">I am uploading SENA sociogram screenshots. Please describe visible structure only: largest emotion nodes, clusters, differences across groups, isolated or central participants, and whether each observation is structural or interpretive.</pre>
    </div>
    
    <div class="prompt-card" data-kind="vision">
      <div class="prompt-title"><span class="badge b-isari">Vision</span><h4>Reading a LACOID Quadrant Plot</h4></div>
      <button class="copy" data-copy="plab8">Copy</button>
      <pre id="plab8">I am uploading a LACOID LDAvis quadrant plot. Please describe visible code positions, closeness, isolation, center/periphery, and relationships worth investigating through representative texts.</pre>
    </div>
    </div></section>`,technical:`<section><div class="hero"><span class="badge b-tech">Technical Notes</span><h2>Running ISARI, File Support, Model Choices, and Workshop Limits</h2><div class="pink-line"></div><p class="lead">ISARI is a local, portable AI workspace designed to support research workflows and integration with SENA, LACOID, MDCOR, and related outputs.</p></div>
<div class="grid-2"><div class="card"><h3>Launching on macOS</h3><ol><li>Open the ISARI folder.</li><li>Double-click <strong>ISARI.app</strong>.</li><li>If macOS blocks the app, remove quarantine attributes from the folder and relaunch.</li></ol><pre class="mini-code">xattr -dr com.apple.quarantine . 2>/dev/null || true</pre></div><div class="card"><h3>Launching on Windows</h3><ol><li>Open the extracted ISARI folder.</li><li>Double-click <strong>ISARI.bat</strong>.</li><li>If Windows shows a warning, run only if the facilitator has confirmed the package source.</li></ol><p>Save conversations before stopping ISARI. Unsaved chat content may be lost when the local server shuts down.</p></div></div>
<div class="card"><h3>Supported file inputs</h3><table><thead><tr><th>Category</th><th>Formats</th><th>Use</th></tr></thead><tbody><tr><td>Plain text</td><td>.txt, .md, .markdown</td><td>Reads text directly.</td></tr><tr><td>Documents</td><td>.pdf, .docx, .doc</td><td>Extracts text locally when possible. Scanned PDFs may need OCR.</td></tr><tr><td>Data files</td><td>.csv, .tsv, .xlsx</td><td>Creates dataset profiles, column summaries, missing-value summaries, and preview rows.</td></tr><tr><td>HTML outputs</td><td>.html, .htm</td><td>Extracts readable text from reports and exported dashboards.</td></tr><tr><td>Images</td><td>.png, .jpg, .jpeg, .webp, .gif, .bmp</td><td>Vision-capable brains can analyze visual structure locally.</td></tr><tr><td>Structured text</td><td>.json, .xml, .rtf</td><td>Extracts readable or structured content.</td></tr></tbody></table></div>
<div class="card gold"><h3>Current ISARI limits</h3><div class="grid-5"><div class="metric"><span>Max file size</span><strong>50 MB</strong><em>per uploaded file</em></div><div class="metric"><span>Text/doc chars</span><strong>250K</strong><em>per file</em></div><div class="metric"><span>HTML chars</span><strong>500K</strong><em>per file</em></div><div class="metric"><span>Combined context</span><strong>220K</strong><em>per prompt</em></div><div class="metric"><span>Dataset preview</span><strong>25</strong><em>rows</em></div></div><p>Excel previews are limited to 10 sheets. If a file is too large, focus on one section, one output, or one analytic question at a time.</p></div>
<div class="card"><h3>Brain selection guide</h3><table><thead><tr><th>Brain</th><th>Best use</th><th>Image support</th></tr></thead><tbody><tr><td>Gemma 3</td><td>Everyday summaries, memo drafting, quick visual grounding.</td><td>Yes</td></tr><tr><td>Qwen2.5-VL</td><td>Charts, tables, screenshots, scanned pages, bilingual figures.</td><td>Yes</td></tr><tr><td>Llama 3.2 Vision</td><td>Complex visuals and dense screenshots on stronger hardware.</td><td>Yes</td></tr><tr><td>Qwen2.5-Coder</td><td>HTML, JSON, scripts, tables, workflow debugging, methods appendices.</td><td>No true visual analysis</td></tr><tr><td>Phi-4 Mini</td><td>Concise conceptual explanations and methods language on modest hardware.</td><td>No true visual analysis</td></tr><tr><td>DeepSeek R1</td><td>Reasoning-heavy synthesis and integrative discussion.</td><td>No true visual analysis</td></tr></tbody></table></div>
</section>`,refs:`<section><div class="hero"><span class="badge b-book">References</span><h2>References</h2><div class="pink-line"></div><p class="lead">Selected publications supporting the analytic frameworks and software tools featured in this workshop.</p></div><div class="card"><ul class="ref-list"><li>Alexander, E., Eppler, M. J., &amp; Bresciani, S. (2019). Visual replay methodology: A mixed methods approach for group discussion analysis. <em>Journal of Mixed Methods Research, 13</em>(1), 33–51.</li><li>Borgatti, S. P., &amp; Molina, J. L. (2005). Toward ethical guidelines for network research in organizations. <em>Social Networks, 27</em>(2), 107–117.</li><li>Braun, V., &amp; Clarke, V. (2006). Using thematic analysis in psychology. <em>Qualitative Research in Psychology, 3</em>(2), 77–101.</li><li>Charmaz, K. (2014). <em>Constructing grounded theory</em> (2nd ed.). Sage.</li><li>Fetters, M. D., &amp; Freshwater, D. (2015). The 1 + 1 = 3 integration challenge. <em>Journal of Mixed Methods Research, 9</em>(2), 115–117.</li><li>González Canché, M. S. (2022). Network analysis of qualitative data: An integrative software application to visualize and assess similarities in participants’ qualitative contributions. <em>Journal of Mixed Methods Research, 16</em>(3), 373–377.</li><li>González Canché, M. S. (2023). Latent Code Identification (LACOID): A machine learning-based integrative framework and open-source software to classify big textual data, rebuild contextualized/unaltered meanings, and avoid aggregation bias. <em>International Journal of Qualitative Methods, 22</em>.</li><li>González Canché, M. S. (2023). Machine driven classification of open-ended responses (MDCOR): An analytic framework and no-code, free software application to classify longitudinal and cross-sectional text responses in survey and social media research. <em>Expert Systems with Applications, 215</em>, 119265.</li><li>González Canché, M. S. (2023). Graphical Retrieval and Analysis of Temporal Information Systems (GRATIS). <em>Journal of Mixed Methods Research, 18</em>(1), 71–103.</li><li>González Canché, M. S. (2025). GeoStoryTelling: An integrative multi-media methodology and no-code, cost-free software to geo-contextualize ethnographic, health, and survey evidence. <em>International Journal of Qualitative Methods, 24</em>.</li><li>González Canché, M. S., &amp; Zheng, K. (2025). Sentiment and Emotion Network Analysis—SENA. <em>International Journal of Qualitative Methods</em>.</li><li>Johnson, R. B., &amp; Onwuegbuzie, A. J. (2004). Mixed methods research: A research paradigm whose time has come. <em>Educational Researcher, 33</em>(7), 14–26.</li><li>Miles, M. B., &amp; Huberman, A. M. (1994). <em>Qualitative data analysis</em> (2nd ed.). Sage.</li><li>Saldaña, J. (2021). <em>The coding manual for qualitative researchers</em> (4th ed.). Sage.</li></ul></div></section>`};const nav=document.getElementById('nav');const main=document.getElementById('main');tabs.forEach((t,i)=>{const b=document.createElement('button');b.className='tab-btn'+(i===0?' active':'');b.innerHTML=`<span>${t.icon}</span>${t.label}`;b.addEventListener('click',()=>switchTab(i));nav.appendChild(b);const p=document.createElement('section');p.className='panel'+(i===0?' active':'');p.id=t.id;p.innerHTML=panels[t.id];main.appendChild(p);});function switchTab(i){document.querySelectorAll('.tab-btn').forEach((b,j)=>b.classList.toggle('active',i===j));document.querySelectorAll('.panel').forEach((p,j)=>p.classList.toggle('active',i===j));window.scrollTo({top:0,behavior:'smooth'});}document.addEventListener('click',async e=>{const c=e.target.closest('[data-copy]');if(c){const txt=document.getElementById(c.dataset.copy)?.innerText||'';try{await navigator.clipboard.writeText(txt);c.textContent='Copied';setTimeout(()=>c.textContent='Copy',1200);}catch(err){}}const ah=e.target.closest('.acc-hdr');if(ah){ah.closest('.acc-item').classList.toggle('open');}});document.addEventListener('input',e=>{if(e.target.id==='promptSearch'){const q=e.target.value.toLowerCase();document.querySelectorAll('.prompt-card').forEach(card=>{card.style.display=card.innerText.toLowerCase().includes(q)?'block':'none';});}});</script></body></html>
