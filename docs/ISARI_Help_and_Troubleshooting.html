const tabs=[{icon:'🆘',label:'Start Here',id:'start'},{icon:'⚠️',label:'Symptoms',id:'symptoms'},{icon:'🧠',label:'Why It Happens',id:'why'},{icon:'🗂️',label:'Folder Layout',id:'layout'},{icon:'🩺',label:'Quick Diagnosis',id:'diagnosis'},{icon:'🛠️',label:'Short Repair',id:'shortrepair'},{icon:'📦',label:'App Wrapper Repair',id:'appwrapper'},{icon:'👁️',label:'Hide / Unhide',id:'hide'},{icon:'✅',label:'Health Checks',id:'health'},{icon:'🚚',label:'Distribution',id:'distribution'},{icon:'📌',label:'Summary',id:'summary'},{icon:'💠',label:'About ISARI & Contact',id:'aboutcontact'}];
const panels={start:`<section><div class="hero"><span class="badge b-tech">START HERE</span><h2>Universal macOS Post-Transfer Repair Kit</h2><div class="pink-line"></div><p class="lead">Use this first if ISARI was moved by AirDrop, ZIP, OneDrive, browser download, external drive, or copied from Windows to macOS.</p></div>


<div class="grid-3"><div class="metric"><span>No folder hunting</span><strong>Auto</strong><em>finds the folder containing ISARI.app and ISARI_AI.</em></div><div class="metric"><span>Common fixes</span><strong>6</strong><em>permissions, quarantine, Python links, line endings, checks.</em></div><div class="metric"><span>Start Terminal</span><strong>⌘ Space</strong><em>type Terminal, press Return, paste script.</em></div></div>
<div class="grid-2"><div class="card green"><h3>Why this is the safest first step</h3><p>This repair kit does <strong>not</strong> delete models, saved chats, prompts, or ISARI data. It repairs launch permissions, quarantine flags, line endings, and portable Python command links. It also verifies that <code>ISARI.app</code> and <code>ISARI_AI</code> are still next to each other.</p><p>Users do not need to manually run <code>cd</code> first. The script searches upward from the current Terminal location and then common folders such as Desktop, Downloads, Documents, and the home folder.</p></div><div class="card pink"><h3>How to run it</h3><ol><li>Open Terminal with <strong>Command + Space</strong>.</li><li>Type <strong>Terminal</strong> and press <strong>Return</strong>.</li><li>Click <strong>Copy repair script</strong> below.</li><li>Paste into Terminal and press <strong>Return</strong>.</li><li>When finished, double-click <strong>ISARI.app</strong> again.</li></ol></div></div>
<div class="prompt-card"><div class="prompt-title"><h4>macOS post-transfer repair script</h4><span class="badge b-tech">Ready to paste into Terminal</span></div><p class="caption">This script is intentionally long because it performs layout detection, permissions repair, quarantine removal, Python link repair, and final checks in one pass.</p><button class="copy" data-copy="code-1">Copy repair script</button><pre id="code-1" class="mini-code">#!/bin/bash

find_isari_root() {
    local current=&quot;$PWD&quot;

    # 1. Walk upward from current Terminal location.
    while [ &quot;$current&quot; != &quot;/&quot; ]; do
        if [ -d &quot;$current/ISARI.app&quot; ] &amp;&amp; [ -d &quot;$current/ISARI_AI&quot; ]; then
            echo &quot;$current&quot;
            return 0
        fi
        current=&quot;$(dirname &quot;$current&quot;)&quot;
    done

    # 2. Search common user locations. The outer folder can have any name.
    local tmpfile
    tmpfile=&quot;$(mktemp)&quot;

    for base in &quot;$HOME/Desktop&quot; &quot;$HOME/Downloads&quot; &quot;$HOME/Documents&quot; &quot;$HOME&quot;; do
        if [ -d &quot;$base&quot; ]; then
            find &quot;$base&quot; -maxdepth 7 -type d -name &quot;ISARI.app&quot; -prune -print 2&gt;/dev/null | while IFS= read -r app_path; do
                parent=&quot;$(dirname &quot;$app_path&quot;)&quot;
                if [ -d &quot;$parent/ISARI_AI&quot; ]; then
                    printf &#x27;%s\n&#x27; &quot;$parent&quot;
                fi
            done
        fi
    done | sort -u &gt; &quot;$tmpfile&quot;

    local count
    count=&quot;$(wc -l &lt; &quot;$tmpfile&quot; | tr -d &#x27; &#x27;)&quot;

    if [ &quot;$count&quot; = &quot;1&quot; ]; then
        cat &quot;$tmpfile&quot;
        rm -f &quot;$tmpfile&quot;
        return 0
    fi

    if [ &quot;$count&quot; = &quot;0&quot; ]; then
        echo &quot;ERROR: Could not find a folder containing both ISARI.app and ISARI_AI.&quot; &gt;&amp;2
        echo &quot;Please open Terminal, type cd, drag the ISARI folder into Terminal, press Return, and run this repair again.&quot; &gt;&amp;2
        rm -f &quot;$tmpfile&quot;
        return 1
    fi

    echo &quot;ERROR: Found more than one possible ISARI folder:&quot; &gt;&amp;2
    cat &quot;$tmpfile&quot; &gt;&amp;2
    echo &quot;&quot; &gt;&amp;2
    echo &quot;Please cd into the correct ISARI folder manually, then run this repair again.&quot; &gt;&amp;2
    rm -f &quot;$tmpfile&quot;
    return 1
}

ISARI_ROOT=&quot;$(find_isari_root)&quot; || exit 1
cd &quot;$ISARI_ROOT&quot; || exit 1

echo &quot;=== ISARI root detected ===&quot;
echo &quot;$ISARI_ROOT&quot;

echo &quot;&quot;
echo &quot;=== Confirming required layout ===&quot;
if [ ! -d &quot;./ISARI_AI&quot; ]; then
    echo &quot;ERROR: ISARI_AI folder is missing.&quot;
    exit 1
fi

if [ ! -d &quot;./ISARI.app&quot; ]; then
    echo &quot;WARNING: ISARI.app is missing. Internal launcher may still work.&quot;
fi

if [ ! -f &quot;./ISARI_AI/ISARI.command&quot; ]; then
    echo &quot;ERROR: ISARI_AI/ISARI.command is missing.&quot;
    echo &quot;ISARI.app requires ISARI_AI/ISARI.command next to it.&quot;
    exit 1
fi

echo &quot;&quot;
echo &quot;=== Unhiding ISARI_AI if hidden ===&quot;
chflags nohidden ./ISARI_AI 2&gt;/dev/null || true

echo &quot;&quot;
echo &quot;=== Fixing line endings in macOS shell launchers ===&quot;
find . -name &quot;*.command&quot; -type f -exec perl -pi -e &#x27;s/\r$//&#x27; {} \;
find . -path &quot;*.app/Contents/MacOS/*&quot; -type f -exec perl -pi -e &#x27;s/\r$//&#x27; {} \;

echo &quot;&quot;
echo &quot;=== Restoring executable permissions ===&quot;
find . -name &quot;*.command&quot; -type f -exec chmod +x {} \;
find . -path &quot;*.app/Contents/MacOS/*&quot; -type f -exec chmod +x {} \;

chmod +x ./ISARI_AI/ISARI.command 2&gt;/dev/null || true
chmod +x ./ISARI_AI/Stop_ISARI.command 2&gt;/dev/null || true
chmod +x ./ISARI_AI/ollama 2&gt;/dev/null || true
chmod +x ./ISARI_AI/portable_python/mac-arm64/bin/python3.12 2&gt;/dev/null || true
chmod +x ./ISARI_AI/portable_python/mac-x86_64/bin/python3.12 2&gt;/dev/null || true

echo &quot;&quot;
echo &quot;=== Removing macOS quarantine attributes ===&quot;
xattr -dr com.apple.quarantine . 2&gt;/dev/null || true

echo &quot;&quot;
echo &quot;=== Repairing portable Python symlinks/wrappers ===&quot;

for PYDIR in \
  &quot;./ISARI_AI/portable_python/mac-arm64/bin&quot; \
  &quot;./ISARI_AI/portable_python/mac-x86_64/bin&quot;
do
  echo &quot;&quot;
  echo &quot;Checking: $PYDIR&quot;

  if [ ! -d &quot;$PYDIR&quot; ]; then
    echo &quot;Missing folder: $PYDIR&quot;
    continue
  fi

  if [ -f &quot;$PYDIR/python3.12&quot; ]; then
    echo &quot;Found python3.12 in $PYDIR&quot;
    chmod +x &quot;$PYDIR/python3.12&quot; 2&gt;/dev/null || true

    echo &quot;Rebuilding python3 and python links...&quot;
    rm -f &quot;$PYDIR/python3&quot; &quot;$PYDIR/python&quot;
    ln -s &quot;python3.12&quot; &quot;$PYDIR/python3&quot;
    ln -s &quot;python3.12&quot; &quot;$PYDIR/python&quot;

    echo &quot;Testing python3:&quot;
    &quot;$PYDIR/python3&quot; --version 2&gt;&amp;1 || true
  else
    echo &quot;WARNING: python3.12 not found in $PYDIR&quot;
    echo &quot;Searching for Python executables:&quot;
    find &quot;$PYDIR&quot; -maxdepth 1 -type f -name &quot;python*&quot; -print -exec ls -la {} \; 2&gt;/dev/null || true
  fi
done

echo &quot;&quot;
echo &quot;=== Final checks ===&quot;
ls -la ./ISARI.app/Contents/MacOS/ 2&gt;/dev/null || true
ls -la ./ISARI_AI/ISARI.command 2&gt;/dev/null || true
./ISARI_AI/portable_python/mac-arm64/bin/python3 --version 2&gt;&amp;1 || true
./ISARI_AI/portable_python/mac-x86_64/bin/python3 --version 2&gt;&amp;1 || true

echo &quot;&quot;
echo &quot;=== Repair complete ===&quot;
echo &quot;Try double-clicking ISARI.app again.&quot;
echo &quot;If needed, test directly with:&quot;
echo &quot;/bin/bash \&quot;$ISARI_ROOT/ISARI_AI/ISARI.command\&quot;&quot;</pre></div></section>`,symptoms:`<section><div class="hero"><span class="badge b-tech">Symptoms</span><h2>What macOS Problems Look Like</h2><div class="pink-line"></div><p class="lead">Most post-transfer ISARI problems are visible as launcher failures, Gatekeeper warnings, or portable Python problems.</p></div>
<div class="grid-3"><div class="card red"><h3>Launcher symptoms</h3><ul><li>Double-clicking <code>ISARI.app</code> does nothing.</li><li>Double-clicking a <code>.command</code> file does nothing.</li><li>Terminal says <code>permission denied</code> or <code>operation not permitted</code>.</li></ul></div><div class="card pink"><h3>Security warnings</h3><ul><li>macOS says Apple could not verify a file.</li><li>Warnings mention Python libraries such as <code>_imaging.cpython-312-darwin.so</code>.</li><li>Opening Anyway repeatedly becomes necessary.</li></ul></div><div class="card gold"><h3>Python or layout symptoms</h3><ul><li><code>python3.12: command not found</code>.</li><li><code>ISARI_AI/ISARI.command</code> cannot be found.</li><li>The internal launcher works but <code>ISARI.app</code> does not.</li></ul></div></div>
<div class="quote-block"><p>If the internal launcher works but ISARI.app does not, ISARI itself is probably fine. The problem is usually permissions, quarantine attributes, portable Python links, or the app wrapper.</p><cite>Practical diagnosis rule</cite></div></section>`,why:`<section><div class="hero"><span class="badge b-tech">Why This Happens</span><h2>macOS Permissions, Quarantine, and Symlinks</h2><div class="pink-line"></div><p class="lead">ISARI is portable, but macOS still enforces executable permissions and Gatekeeper quarantine attributes after transfers.</p></div>
<div class="grid-2"><div class="card"><h3>Executable permissions</h3><p>macOS uses Unix-style executable permissions. A script must be marked executable before macOS can run it as a program. Some transfer methods strip that permission from <code>.command</code> files or app-wrapper executables.</p></div><div class="card"><h3>Quarantine attributes</h3><p>Downloaded or transferred files can receive <code>com.apple.quarantine</code>. That attribute can trigger repeated verification warnings for app contents or Python libraries.</p></div><div class="card"><h3>Portable Python links</h3><p>Portable Python may rely on command links such as <code>python3</code> and <code>python</code> pointing to <code>python3.12</code>. ZIP, browser, or cross-platform transfer can damage those links.</p></div><div class="card"><h3>App wrapper layout</h3><p><code>ISARI.app</code> expects <code>ISARI_AI/ISARI.command</code> beside it. If the folder was renamed, moved, or omitted, the app wrapper cannot launch ISARI.</p></div></div></section>`,layout:`<section><div class="hero"><span class="badge b-tech">Folder Layout</span><h2>The Portable ISARI Folder Structure</h2><div class="pink-line"></div><p class="lead">The outer folder name can change. The sibling relationship between ISARI.app and ISARI_AI should not.</p></div>
<div class="grid-2"><div class="card green"><h3>Required rule</h3><p><code>ISARI.app</code> and <code>ISARI_AI</code> must stay in the same parent folder. The inner folder should remain named exactly <code>ISARI_AI</code> unless the launchers are edited.</p><p>The parent folder can be named anything: <code>ISARI</code>, <code>ISARIas</code>, <code>ISARI copy</code>, or a workshop folder.</p></div><div class="card"><h3>Recommended user-facing layout</h3><pre class="mini-code">ISARI/
├── ISARI.app
├── ISARI.bat
└── ISARI_AI/        hidden if desired</pre></div></div>
<div class="card"><h3>Full portable package layout</h3><pre class="mini-code">ISARI/
├── ISARI.app                  macOS user-facing launcher
├── ISARI.bat                  Windows user-facing launcher
├── Hide_ISARI_AI.command      optional helper
├── Unhide_ISARI_AI.command    optional helper
├── Hide_ISARI_AI.bat          optional helper
├── Unhide_ISARI_AI.bat        optional helper
└── ISARI_AI/
    ├── ISARI.command          internal macOS launcher
    ├── Stop_ISARI.command     internal macOS stop script
    ├── ISARI.bat              internal Windows launcher
    ├── Stop_ISARI.bat         internal Windows stop script
    ├── isari_server.py
    ├── isari_audio_server.py  optional audio/video backend
    ├── ui/
    ├── models/
    ├── audio_models/
    ├── saved_chats/
    ├── portable_python/
    └── _maintenance/</pre></div></section>`,diagnosis:`<section><div class="hero"><span class="badge b-tech">Diagnosis</span><h2>Quick Checks Before Rebuilding Anything</h2><div class="pink-line"></div><p class="lead">Use these checks to tell whether the problem is the ISARI runtime, the app wrapper, or the folder layout.</p></div>
<div class="grid-2"><div class="card"><h3>Test the internal launcher</h3><p>If this works, ISARI’s local server, Python runtime, and models are likely okay. The issue is probably the outer app wrapper or macOS permissions.</p><button class="copy" data-copy="code-2">Copy diagnosis command</button><pre id="code-2" class="mini-code">cd &quot;/path/to/ISARI&quot;
/bin/bash ./ISARI_AI/ISARI.command</pre></div><div class="card red"><h3>About the missing ISARI.command message</h3><p>The message <code>Could not find ISARI_AI/ISARI.command next to ISARI.app</code> means the app wrapper could not find a sibling folder named <code>ISARI_AI</code> containing <code>ISARI.command</code>.</p><p>The repair script verifies this layout, but it cannot recreate a missing folder. If the folder is missing or renamed, put <code>ISARI.app</code> and <code>ISARI_AI</code> back next to each other first.</p></div></div>
<div class="card gold"><h3>Should users always run the repair script?</h3><p>No. Run it after transfer, download, unzip, AirDrop, OneDrive download, external-drive movement, or macOS blocking. Once repaired on a Mac, double-clicking <code>ISARI.app</code> should usually work normally. If the folder is copied to a new Mac, run the repair again on the receiving Mac.</p><p><a href="#start" data-switch-tab="start">Jump to the full repair script</a>.</p></div></section>`,shortrepair:`<section><div class="hero"><span class="badge b-tech">Short Repair</span><h2>Executable Permissions and Quarantine Only</h2><div class="pink-line"></div><p class="lead">Use this shorter repair only if you are already inside the folder containing ISARI.app and ISARI_AI.</p></div>
<div class="card"><h3>Short command set</h3><p>This does not do the full auto-detection or portable Python symlink rebuild. For ordinary users, the full repair kit is safer.</p><button class="copy" data-copy="code-3">Copy short repair</button><pre id="code-3" class="mini-code">find . -name &quot;*.command&quot; -type f -exec chmod +x {} \;
find . -path &quot;*.app/Contents/MacOS/*&quot; -type f -exec chmod +x {} \;
chmod +x ./ISARI_AI/portable_python/mac-arm64/bin/python3 2&gt;/dev/null || true
chmod +x ./ISARI_AI/portable_python/mac-x86_64/bin/python3 2&gt;/dev/null || true
chmod +x ./ISARI_AI/ollama 2&gt;/dev/null || true
xattr -dr com.apple.quarantine . 2&gt;/dev/null || true</pre></div></section>`,appwrapper:`<section><div class="hero"><span class="badge b-tech">App Wrapper</span><h2>Rebuild ISARI.app When the Internal Launcher Works</h2><div class="pink-line"></div><p class="lead">Use this only when <code>/bin/bash ./ISARI_AI/ISARI.command</code> works but double-clicking <code>ISARI.app</code> does not.</p></div>
<div class="grid-2"><div class="card"><h3>What gets rebuilt?</h3><p>Only the outer macOS app wrapper is rebuilt. The main ISARI runtime, models, saved chats, server files, audio files, and UI folder are not modified.</p></div><div class="card green"><h3>Portability rule</h3><p>The rebuilt wrapper is relative. It finds its own parent folder and launches <code>ISARI_AI/ISARI.command</code>. The parent folder can move as long as <code>ISARI.app</code> and <code>ISARI_AI</code> stay together.</p></div></div>
<div class="prompt-card"><div class="prompt-title"><h4>Rebuild ISARI.app wrapper</h4><span class="badge b-tech">Advanced support step</span></div><button class="copy" data-copy="code-4">Copy app rebuild script</button><pre id="code-4" class="mini-code">cd &quot;/path/to/ISARI&quot;

if [ ! -d &quot;ISARI_AI&quot; ]; then

fi

echo &quot;=== Backing up old ISARI.app ===&quot;
mv ISARI.app &quot;ISARI.app.backup.$(date +%Y%m%d_%H%M%S)&quot; 2&gt;/dev/null || true

echo &quot;=== Creating new ISARI.app wrapper ===&quot;
mkdir -p &quot;ISARI.app/Contents/MacOS&quot;
mkdir -p &quot;ISARI.app/Contents/Resources&quot;

cat &gt; &quot;ISARI.app/Contents/Info.plist&quot; &lt;&lt;&#x27;PLIST&#x27;

    &lt;key&gt;CFBundleExecutable&lt;/key&gt;&lt;string&gt;ISARI&lt;/string&gt;
    &lt;key&gt;LSMinimumSystemVersion&lt;/key&gt;&lt;string&gt;10.13&lt;/string&gt;
    &lt;key&gt;NSHighResolutionCapable&lt;/key&gt;&lt;true/&gt;
&lt;/dict&gt;
&lt;/plist&gt;
PLIST

cat &gt; &quot;ISARI.app/Contents/MacOS/ISARI&quot; &lt;&lt;&#x27;APP&#x27;
#!/bin/bash
APP_EXE=&quot;$0&quot;
APP_MACOS_DIR=&quot;$(cd &quot;$(dirname &quot;$APP_EXE&quot;)&quot; &amp;&amp; pwd)&quot;

ISARI_ROOT=&quot;$(dirname &quot;$APP_BUNDLE_DIR&quot;)&quot;
cd &quot;$ISARI_ROOT&quot; || exit 1

if [ ! -f &quot;$ISARI_ROOT/ISARI_AI/ISARI.command&quot; ]; then
    osascript -e &#x27;display dialog &quot;Could not find ISARI_AI/ISARI.command next to ISARI.app. Please keep ISARI.app and ISARI_AI in the same folder.&quot; buttons {&quot;OK&quot;} default button &quot;OK&quot; with icon caution&#x27;
    exit 1
fi

chmod +x &quot;$ISARI_ROOT/ISARI_AI/ISARI.command&quot; 2&gt;/dev/null || true
/usr/bin/open -a Terminal &quot;$ISARI_ROOT/ISARI_AI/ISARI.command&quot;
exit 0
APP

chmod +x &quot;ISARI.app/Contents/MacOS/ISARI&quot;
chmod +x &quot;ISARI_AI/ISARI.command&quot; 2&gt;/dev/null || true
xattr -dr com.apple.quarantine &quot;ISARI.app&quot; 2&gt;/dev/null || true

echo &quot;=== New ISARI.app created. Try double-clicking it now. ===&quot;</pre></div>
<div class="card"><h3>Quiet wrapper option</h3><p>The visible Terminal wrapper is recommended for workshops because users can see what happened. After testing, a quieter wrapper can send output to a log.</p><button class="copy" data-copy="code-5">Copy quiet wrapper lines</button><pre id="code-5" class="mini-code">/bin/bash &quot;$ISARI_ROOT/ISARI_AI/ISARI.command&quot; &gt;/tmp/isari_launcher.log 2&gt;&amp;1 &amp;
cat /tmp/isari_launcher.log</pre></div></section>`,hide:`<section><div class="hero"><span class="badge b-tech">Hide / Unhide</span><h2>Hide or Unhide ISARI_AI</h2><div class="pink-line"></div><p class="lead">For a clean user-facing folder, regular users can mainly see ISARI.app and ISARI.bat while ISARI_AI stays hidden.</p></div>
<div class="grid-2"><div class="card"><h3>macOS Finder commands</h3><button class="copy" data-copy="code-6">Copy macOS hide/unhide commands</button><pre id="code-6" class="mini-code">chflags hidden ./ISARI_AI

<div class="grid-2"><div class="card green"><h3>Running check</h3><p>After launching ISARI, open this in a browser:</p><pre class="mini-code">http://127.0.0.1:8000/health</pre><p>If ISARI is running, the browser should show JSON with <code>"ok": true</code>.</p></div><div class="card red"><h3>Stopped check</h3><p>After clicking Stop ISARI or running <code>Stop_ISARI.command</code>, curl should fail to connect.</p><button class="copy" data-copy="code-8">Copy health checks</button><pre id="code-8" class="mini-code">http://127.0.0.1:8000/health

ps aux | grep -i &quot;isari_server.py\|ollama&quot; | grep -v grep</pre></div></div></section>`,distribution:`<section><div class="hero"><span class="badge b-tech">Distribution</span><h2>Better Packaging Than ZIP</h2><div class="pink-line"></div><p class="lead">For macOS, .tar.gz archives usually preserve Unix executable permissions better than ZIP.</p></div>
<div class="grid-2"><div class="card gold"><h3>Recommended for macOS</h3><p>Create the archive on macOS from the parent folder containing <code>ISARI.app</code>, <code>ISARI.bat</code>, and <code>ISARI_AI</code>.</p><button class="copy" data-copy="code-9">Copy tar commands</button><pre id="code-9" class="mini-code">tar -czf ISARI_Portable_macOS.tar.gz ISARI.app ISARI.bat ISARI_AI
tar -xzf ISARI_Portable_macOS.tar.gz</pre></div><div class="card"><h3>OneDrive and AirDrop notes</h3><p>Uploading the full folder with the OneDrive sync app can work for your own machines. Browser downloads, cross-platform movement, AirDrop, and ZIP may still trigger quarantine attributes, permission loss, or symlink damage. Keep this HTML help file inside <code>ISARI_AI/_maintenance</code>.</p></div></div></section>`,summary:`<section><div class="hero"><span class="badge b-tech">Summary</span><h2>Recommended Support Path</h2><div class="pink-line"></div><p class="lead">A practical decision tree for ISARI support staff and workshop users.</p></div>
<div class="grid-4"><div class="tool-card"><div>1</div><h4>Keep the layout</h4><p>ISARI.app and ISARI_AI must stay together.</p></div><div class="tool-card"><div>2</div><h4>Run repair after transfer</h4><p>Use the START HERE script after AirDrop, ZIP, download, or copy.</p></div><div class="tool-card"><div>3</div><h4>Test internal launcher</h4><p>If it works, the runtime is likely fine.</p></div><div class="tool-card"><div>4</div><h4>Rebuild only if needed</h4><p>Rebuild ISARI.app only when wrapper failure persists.</p></div></div>
<div class="card dark"><h3>Best practice</h3><p>Keep the parent folder portable, keep ISARI_AI named exactly ISARI_AI, do not move files out of ISARI_AI unless launchers are updated, and store maintenance files inside ISARI_AI/_maintenance.</p></div></section>`,aboutcontact:`<section><div class="hero"><span class="badge b-isari">About ISARI</span><h2>What ISARI Is, How to Use This Help, and How to Get Access</h2><div class="pink-line"></div><p class="lead">ISARI—Intelligent Systems for Academic Research Integration—is a local and fully offline AI workspace designed to support ethical scholarly inquiry, brainstorming, memoing, synthesis, technical troubleshooting, and portable research workflows across Mac and Windows environments.</p></div>
<div class="about-map"><div class="card about-orb"><span class="badge b-tech">How this help dashboard works</span><h3>A guided repair map, not a wall of instructions</h3><p>This HTML help file is organized as a practical journey. Start with <strong>Start Here</strong> when ISARI has just been downloaded, copied, AirDropped, unzipped, or moved. Then use the tabs as a diagnostic map: symptoms explain what macOS problems look like, layout explains where files must live, diagnosis separates app-wrapper issues from runtime issues, and repair tabs provide copy-ready commands.</p><div class="mini-route"><div class="step-dot"><span>🆘</span>Start Here</div><div class="step-dot"><span>⚠️</span>Symptoms</div><div class="step-dot"><span>🗂️</span>Layout</div><div class="step-dot"><span>🩺</span>Diagnosis</div><div class="step-dot"><span>✅</span>Health</div></div></div><div class="card dark"><span class="badge" style="background:rgba(255,255,255,.16);color:#fff;">Core idea</span><h3 style="color:#fff;margin-top:10px;">Local, portable, repairable</h3><p style="color:rgba(255,255,255,.9);">ISARI is designed to travel as a folder. That portability is powerful, but macOS may add quarantine flags, strip executable permissions, or damage Python links during transfer. This help file explains how to restore the package without deleting models, prompts, saved chats, or research data.</p><div class="contact-chip-row"><a class="contact-chip dark" href="#start" data-switch-tab="start">Run the main repair path</a><a class="contact-chip dark" href="#distribution" data-switch-tab="distribution">See distribution guidance</a></div></div></div>
